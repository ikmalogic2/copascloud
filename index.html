<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>i-cloud</title>
    
    <!-- Google Fonts: Space Grotesk -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        ::-webkit-scrollbar { width: 0px; height: 0px; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .modal-enter { transform: translateY(100%); opacity: 0; transition: all 0.3s ease-out; }
        .modal-active { transform: translateY(0); opacity: 1; }
        
        .glass-header {
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .dark .glass-header {
            background-color: rgba(17, 24, 39, 0.85);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .accordion-content {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .accordion-content.open { grid-template-rows: 1fr; }
        .accordion-inner { overflow: hidden; }

        .chevron-icon { transition: transform 0.3s ease; }
        .chevron-icon.open { transform: rotate(180deg); }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden bg-[#F2F2F7] dark:bg-gray-900 transition-colors duration-300">

    <!-- Header dengan Tombol Aksi -->
    <header class="glass-header fixed top-0 w-full z-20 h-14 flex items-center justify-between px-4 md:px-6 lg:px-8">
        <h1 class="text-[17px] font-bold text-gray-800 dark:text-white tracking-tight flex items-center">
            <i class="fa-solid fa-cloud text-blue-600 dark:text-blue-500 mr-2"></i> i-cloud
        </h1>
        
        <div class="flex items-center space-x-3">
            <div id="cloud-sync-icon" class="text-gray-400 mr-1" title="Menyambungkan ke Cloud..."><i class="fa-solid fa-cloud"></i></div>
            
            <input type="file" id="import-file" accept=".json" class="hidden" onchange="window.importData(event)">
            
            <button onclick="document.getElementById('import-file').click()" class="flex flex-col items-center justify-center text-gray-500 dark:text-gray-400 active:opacity-50 w-10" title="Import Data">
                <i class="fa-solid fa-cloud-arrow-up text-[16px]"></i>
                <span class="text-[9px] font-bold mt-0.5">IMPORT</span>
            </button>
            <button onclick="window.exportData()" class="flex flex-col items-center justify-center text-gray-500 dark:text-gray-400 active:opacity-50 w-10" title="Export Data">
                <i class="fa-solid fa-cloud-arrow-down text-[16px]"></i>
                <span class="text-[9px] font-bold mt-0.5">EXPORT</span>
            </button>
            
            <div class="w-px h-5 bg-gray-300 dark:bg-gray-700 mx-1"></div>
            
            <button onclick="window.toggleTheme()" id="btn-theme" class="w-8 h-8 flex items-center justify-center text-yellow-500 active:opacity-50 text-[18px]" title="Ubah Tema">
                <i class="fa-solid fa-sun" id="theme-icon"></i>
            </button>

            <button onclick="window.toggleGroupView()" id="btn-group" class="w-8 h-8 flex items-center justify-center text-indigo-500 active:opacity-50 text-[18px]" title="Kategorikan">
                <i class="fa-solid fa-layer-group"></i>
            </button>
            <button onclick="window.openModal()" class="w-8 h-8 flex items-center justify-center text-blue-600 dark:text-blue-400 active:opacity-50 text-[24px]" title="Tambah Catatan">
                <i class="fa-solid fa-circle-plus"></i>
            </button>
        </div>
    </header>

    <!-- Area Utama: Penuh pada Desktop -->
    <main class="flex-1 overflow-y-auto hide-scrollbar pt-20 pb-10 px-4 lg:px-8" id="main-area">
        <div id="notes-container" class="w-full max-w-[1600px] mx-auto">
            <!-- Loading Spinner -->
            <div class="col-span-full flex justify-center py-20">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl text-blue-500"></i>
            </div>
        </div>
    </main>

    <!-- MODAL TAMBAH/EDIT CATATAN -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/50 dark:bg-black/70 z-30 hidden opacity-0 transition-opacity duration-300" onclick="window.closeModal()"></div>
    
    <div id="modal" class="fixed inset-x-0 bottom-0 z-40 bg-white dark:bg-gray-800 rounded-t-3xl h-[85vh] md:max-w-2xl md:mx-auto shadow-2xl modal-enter flex flex-col transition-colors">
        <div class="flex justify-between items-center px-5 py-4 border-b border-gray-100 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 rounded-t-3xl shrink-0">
            <button onclick="window.closeModal()" class="text-gray-500 dark:text-gray-400 font-medium">Batal</button>
            <h2 class="font-semibold text-[17px] text-gray-800 dark:text-white" id="modal-title">Buat Catatan</h2>
            <button onclick="window.saveNote()" class="text-blue-600 dark:text-blue-400 font-bold">Simpan</button>
        </div>
        
        <div class="p-5 flex-1 overflow-y-auto hide-scrollbar bg-white dark:bg-gray-800">
            <input type="hidden" id="note-id">
            
            <div class="mb-4">
                <label class="block text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-1">Pilih Kategori</label>
                <div class="relative">
                    <select id="note-category" onchange="window.toggleInputFields()" class="w-full appearance-none bg-gray-100 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 text-gray-700 dark:text-gray-200 py-3 px-4 rounded-xl font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white dark:focus:bg-gray-600 transition-colors">
                        <option value="carousel">🗂️ Carousel Notes</option>
                        <option value="copas" selected>📋 Copas</option>
                        <option value="efekfont">🔤 Efek Font</option>
                        <option value="error">🐛 Error Book</option>
                        <option value="ideation">💡 Ideation</option>
                        <option value="myinstruction">💻 Instruction</option>
                        <option value="memo">📝 Memo Tasks</option>
                        <option value="mylink">🔗 My Link</option>
                        <option value="mypassword">🔑 My Password</option>
                        <option value="myprompt">⌨️ My Prompt</option>
                        <option value="oneshot">🎯 One Shot</option>
                        <option value="revisi">🔄 Revisi</option>
                        <option value="styleart">🎨 Style Art</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500 dark:text-gray-400">
                        <i class="fa-solid fa-chevron-down text-sm"></i>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <input type="text" id="note-title" placeholder="Judul Catatan..." class="w-full text-[20px] font-bold focus:outline-none text-black dark:text-white bg-transparent placeholder-gray-300 dark:placeholder-gray-500 py-2 border-b border-gray-100 dark:border-gray-700">
            </div>

            <!-- Bagian Lampiran (Disesuaikan untuk Cloud) -->
            <div class="mb-4">
                <label class="block text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-2">Lampiran (Maks 800KB/File untuk Cloud)</label>
                <div class="flex space-x-2 mb-2">
                    <button onclick="document.getElementById('attach-image').click()" class="bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 px-3 py-2 rounded-lg text-sm font-medium transition"><i class="fa-solid fa-image text-blue-500 dark:text-blue-400 mr-1"></i> Gambar</button>
                    <button onclick="document.getElementById('attach-file').click()" class="bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 px-3 py-2 rounded-lg text-sm font-medium transition"><i class="fa-solid fa-paperclip text-purple-500 dark:text-purple-400 mr-1"></i> File</button>
                    <input type="file" id="attach-image" accept="image/*" class="hidden" onchange="window.handleFileUpload(event, 'image')" multiple>
                    <input type="file" id="attach-file" accept=".txt,.pdf,.html,.json,.doc,.docx,.xls,.xlsx,.csv" class="hidden" onchange="window.handleFileUpload(event, 'file')" multiple>
                </div>
                <div id="attachment-preview" class="flex flex-wrap gap-2"></div>
            </div>
            
            <!-- Mode Teks Biasa -->
            <div id="normal-input-container" class="w-full flex-col flex h-48">
                <textarea id="note-content" placeholder="Ketik isi catatan di sini..." class="w-full h-full text-[16px] focus:outline-none text-gray-700 dark:text-gray-200 placeholder-gray-300 dark:placeholder-gray-500 resize-none leading-relaxed bg-gray-50 dark:bg-gray-700 p-3 rounded-xl border border-gray-100 dark:border-gray-600"></textarea>
            </div>

            <!-- Mode Carousel -->
            <div id="carousel-input-container" class="w-full flex-col hidden pb-5">
                <div class="flex justify-between items-center mb-3">
                    <label class="text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider">Isi Kartu Carousel</label>
                    <div class="flex items-center space-x-2 bg-gray-100 dark:bg-gray-700 rounded-lg p-1 border border-gray-200 dark:border-gray-600">
                        <button onclick="window.changeCarouselCount(-1)" class="w-7 h-7 flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 rounded active:scale-95 transition-all"><i class="fa-solid fa-minus text-xs"></i></button>
                        <span id="carousel-count-display" class="text-sm font-bold text-gray-800 dark:text-gray-200 w-6 text-center">3</span>
                        <button onclick="window.changeCarouselCount(1)" class="w-7 h-7 flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 rounded active:scale-95 transition-all"><i class="fa-solid fa-plus text-xs"></i></button>
                    </div>
                </div>
                <div id="carousel-cards-wrapper" class="space-y-3"></div>
            </div>
            
            <!-- Mode My Password -->
            <div id="mypassword-input-container" class="w-full flex-col hidden space-y-4 pb-5">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase mb-1">Username / Email</label>
                    <input type="text" id="pw-username" placeholder="Masukkan Username..." class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-100 dark:border-gray-600 p-3 rounded-xl text-[15px] text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase mb-1">Password</label>
                    <input type="text" id="pw-password" placeholder="Masukkan Password..." class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-100 dark:border-gray-600 p-3 rounded-xl text-[15px] text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase mb-1">Link / URL</label>
                    <input type="url" id="pw-link" placeholder="https://..." class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-100 dark:border-gray-600 p-3 rounded-xl text-[15px] text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <!-- Mode Revisi -->
            <div id="revisi-input-container" class="w-full flex-col hidden space-y-4 pb-5">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase mb-1">Tujuan Revisi</label>
                    <input type="text" id="rev-tujuan" placeholder="Misal: Perbaiki grammar, kurangi pengulangan..." class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-100 dark:border-gray-600 p-3 rounded-xl text-[15px] text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase mb-1">Teks Utama</label>
                    <textarea id="rev-content" placeholder="Ketik teks yang akan atau telah direvisi..." class="w-full h-40 bg-gray-50 dark:bg-gray-700 border border-gray-100 dark:border-gray-600 p-3 rounded-xl text-[15px] text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none leading-relaxed"></textarea>
                </div>
            </div>

            <!-- Mode One Shot -->
            <div id="oneshot-input-container" class="w-full flex-col hidden pb-5 items-center justify-center py-6">
                <div class="w-20 h-20 bg-rose-100 dark:bg-rose-900/30 text-rose-500 rounded-full flex items-center justify-center text-4xl mb-4">🎯</div>
                <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-2">Mode Anti-Distraksi</h3>
                <p class="text-center text-sm text-gray-500 dark:text-gray-400 mb-6 px-4">Teks otomatis hilang per kata saat menekan spasi untuk melatih aliran ide.</p>
                <button onclick="window.openOneShotFullscreen()" class="bg-rose-500 hover:bg-rose-600 text-white px-8 py-3.5 rounded-2xl font-bold transition-colors shadow-lg active:scale-95 w-full md:w-auto flex items-center justify-center">
                    <i class="fa-solid fa-expand mr-2"></i> Buka Kanvas One Shot
                </button>
            </div>
        </div>
    </div>

    <!-- CUSTOM DELETE ALERT OVERLAY -->
    <div id="delete-alert-overlay" class="fixed inset-0 bg-black/50 dark:bg-black/70 z-50 hidden opacity-0 transition-opacity duration-300 flex items-center justify-center p-4">
        <div id="delete-alert-box" class="bg-white dark:bg-gray-800 rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl transform scale-95 transition-transform duration-300">
            <div class="p-6 text-center">
                <div class="w-16 h-16 rounded-full bg-red-100 dark:bg-red-900/30 flex items-center justify-center mx-auto mb-4 text-red-500">
                    <i class="fa-solid fa-triangle-exclamation text-3xl"></i>
                </div>
                <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-2">Hapus Catatan?</h3>
                <p class="text-sm text-gray-500 dark:text-gray-400">Tindakan ini tidak dapat dibatalkan. Catatan akan dihapus permanen dari Cloud.</p>
            </div>
            <div class="flex border-t border-gray-100 dark:border-gray-700">
                <button onclick="window.closeDeleteAlert()" class="flex-1 py-3.5 text-gray-600 dark:text-gray-400 font-medium hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors border-r border-gray-100 dark:border-gray-700">Batal</button>
                <button onclick="window.confirmDelete()" class="flex-1 py-3.5 text-red-600 dark:text-red-500 font-bold hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">Hapus</button>
            </div>
        </div>
    </div>

    <!-- CUSTOM COPY OPTIONS OVERLAY -->
    <div id="copy-options-overlay" class="fixed inset-0 bg-black/50 dark:bg-black/70 z-50 hidden opacity-0 transition-opacity duration-300 flex items-center justify-center p-4">
        <div id="copy-options-box" class="bg-white dark:bg-gray-800 rounded-2xl w-full max-w-xs overflow-hidden shadow-2xl transform scale-95 transition-transform duration-300">
            <div class="p-5 text-center border-b border-gray-100 dark:border-gray-700">
                <div class="w-12 h-12 rounded-full bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center mx-auto mb-3 text-blue-500">
                    <i class="fa-regular fa-copy text-xl"></i>
                </div>
                <h3 class="text-lg font-bold text-gray-900 dark:text-white">Opsi Salin</h3>
            </div>
            <div class="flex flex-col">
                <button onclick="window.executeCopy(true)" class="py-4 text-gray-800 dark:text-gray-200 font-medium hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors border-b border-gray-100 dark:border-gray-700">Beserta Judul</button>
                <button onclick="window.executeCopy(false)" class="py-4 text-gray-800 dark:text-gray-200 font-medium hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors border-b border-gray-100 dark:border-gray-700">Tanpa Judul</button>
                <button onclick="window.closeCopyOptions()" class="py-4 text-red-500 font-medium hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors">Batal</button>
            </div>
        </div>
    </div>

    <!-- TOAST NOTIFICATION -->
    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-800 dark:bg-white text-white dark:text-gray-900 px-5 py-3 rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] transition-all duration-300 translate-y-20 opacity-0 z-50 flex items-center pointer-events-none border border-gray-700 dark:border-gray-200">
        <i class="fa-solid fa-check-circle text-green-400 dark:text-green-500 text-lg mr-3"></i>
        <span id="toast-message" class="text-[14px] font-medium">Teks berhasil disalin!</span>
    </div>

    <!-- CUSTOM ONE SHOT FULLSCREEN KANVAS -->
    <div id="oneshot-fullscreen-overlay" class="fixed inset-0 bg-[#F2F2F7] dark:bg-gray-900 z-[100] hidden flex-col transition-opacity duration-300 opacity-0">
        <div class="absolute top-6 left-6 right-6 flex justify-between items-center z-30 pointer-events-none">
            <div id="oneshot-fs-stats" class="text-sm font-bold text-rose-500 bg-rose-100 dark:bg-rose-900/30 px-4 py-2 rounded-full shadow-sm pointer-events-auto">0 Kata</div>
            <button onclick="window.closeOneShotFullscreen()" class="w-12 h-12 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-full shadow-lg flex items-center justify-center text-gray-800 dark:text-white hover:scale-105 active:scale-95 transition pointer-events-auto">
                <i class="fa-solid fa-check text-xl"></i>
            </button>
        </div>
        <textarea id="oneshot-fs-hidden" class="hidden"></textarea>
        <div class="flex-1 flex items-center justify-center p-8 relative overflow-hidden z-10">
            <div id="oneshot-fs-visible" contenteditable="true" autocapitalize="none" oninput="window.handleOneShotInput(event)" class="w-full max-w-5xl mx-auto text-center text-5xl md:text-[6vw] font-black text-gray-800 dark:text-gray-200 focus:outline-none empty:before:content-[attr(data-placeholder)] empty:before:text-gray-300 dark:empty:before:text-gray-700 leading-tight break-words" data-placeholder="Ketik di sini..."></div>
        </div>
        <div id="oneshot-fs-preview-box" class="absolute inset-x-6 top-24 bottom-28 md:inset-x-24 md:top-32 md:bottom-32 bg-white/90 dark:bg-gray-800/90 backdrop-blur-md rounded-3xl shadow-2xl p-8 hidden overflow-y-auto text-lg md:text-2xl leading-relaxed text-gray-800 dark:text-gray-200 z-20 border border-gray-200 dark:border-gray-700"></div>
        <div class="absolute bottom-8 left-1/2 transform -translate-x-1/2 z-30 pointer-events-auto">
            <button onclick="window.toggleOneShotPreview()" id="btn-oneshot-preview" class="bg-gray-800 dark:bg-white text-white dark:text-gray-900 px-6 py-3 rounded-full font-bold shadow-xl hover:scale-105 active:scale-95 transition flex items-center text-sm md:text-base">
                <i class="fa-solid fa-eye mr-2"></i> <span id="oneshot-preview-btn-text">Intip Teks</span>
            </button>
        </div>
    </div>

    <input type="file" id="carousel-image-input" accept="image/*" class="hidden" onchange="window.handleCarouselImageUpload(event)">

    <!-- CUSTOM EDIT CAROUSEL CARD MODAL -->
    <div id="edit-card-overlay" class="fixed inset-0 bg-black/50 dark:bg-black/70 z-50 hidden opacity-0 transition-opacity duration-300 flex items-center justify-center p-4">
        <div id="edit-card-box" class="bg-white dark:bg-gray-800 rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl transform scale-95 transition-transform duration-300 flex flex-col">
            <div class="px-5 py-4 border-b border-gray-100 dark:border-gray-700 flex justify-between items-center bg-gray-50 dark:bg-gray-900">
                <h3 class="font-bold text-gray-900 dark:text-white">Edit Kartu Carousel</h3>
                <button onclick="window.closeEditCarouselCardModal()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200"><i class="fa-solid fa-times"></i></button>
            </div>
            <div class="p-5 flex-1 bg-white dark:bg-gray-800">
                <textarea id="edit-card-textarea" placeholder="Isi kartu..." class="w-full h-32 bg-gray-50 dark:bg-gray-700 border border-gray-100 dark:border-gray-600 p-3 rounded-xl text-[15px] text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
            </div>
            <div class="flex border-t border-gray-100 dark:border-gray-700">
                <button onclick="window.closeEditCarouselCardModal()" class="flex-1 py-3.5 text-gray-600 dark:text-gray-400 font-medium hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors border-r border-gray-100 dark:border-gray-700">Batal</button>
                <button onclick="window.saveEditCarouselCard()" class="flex-1 py-3.5 text-blue-600 dark:text-blue-500 font-bold hover:bg-blue-50 dark:hover:bg-blue-900/20 transition-colors">Simpan</button>
            </div>
        </div>
    </div>

    <!-- MODULE FIREBASE SCRIPT -->
    <script type="module">
        // 1. Inisialisasi Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAE3MKjPahvYijBpd5ASU8z2MUFOTkSHGA",
            authDomain: "prompt-ikmal.firebaseapp.com",
            projectId: "prompt-ikmal",
            storageBucket: "prompt-ikmal.firebasestorage.app",
            messagingSenderId: "503249462253",
            appId: "1:503249462253:web:aa9e549138349925247de4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const notesCollection = collection(db, "notes");

        const categories = {
            carousel: { title: "Carousel Notes", icon: "🗂️", color: "text-pink-500 dark:text-pink-400", bg: "bg-pink-100 dark:bg-pink-900/30" },
            copas: { title: "Copas", icon: "📋", color: "text-green-500 dark:text-green-400", bg: "bg-green-100 dark:bg-green-900/30" },
            efekfont: { title: "Efek Font", icon: "🔤", color: "text-emerald-500 dark:text-emerald-400", bg: "bg-emerald-100 dark:bg-emerald-900/30" },
            error: { title: "Error Book", icon: "🐛", color: "text-red-500 dark:text-red-400", bg: "bg-red-100 dark:bg-red-900/30" },
            ideation: { title: "Ideation", icon: "💡", color: "text-amber-500 dark:text-amber-400", bg: "bg-amber-100 dark:bg-amber-900/30" },
            myinstruction: { title: "Instruction", icon: "💻", color: "text-indigo-500 dark:text-indigo-400", bg: "bg-indigo-100 dark:bg-indigo-900/30" },

        window.loadNotesFromCloud = function() {

            onSnapshot(q, (snapshot) => {
                notes = [];
                snapshot.forEach((docSnap) => {
                    notes.push({ id: docSnap.id, ...docSnap.data() });
                });
                
                // Urutkan dari terbaru ke terlama via JavaScript (lebih aman dan tidak perlu Index di Firebase)
                notes.sort((a, b) => b.timestamp - a.timestamp);
                
                window.renderNotes();
                const cloudIcon = document.getElementById('cloud-sync-icon');
                cloudIcon.innerHTML = '<i class="fa-solid fa-cloud-check text-green-500"></i>';

        window.handleOneShotInput = function(e) {
            const visibleEl = document.getElementById('oneshot-fs-visible');
            const hiddenEl = document.getElementById('oneshot-fs-hidden');
            let val = visibleEl.innerText.replace(/\u00A0/g, " "); 

            if (val.length === 1 && val.match(/[a-z]/)) {
                const hiddenVal = hiddenEl.value;
                if (hiddenVal === "" || /(?:[.!?])[\s\n]*$/.test(hiddenVal)) {
                    val = val.toUpperCase();
                    visibleEl.innerText = val;
                    window.placeCaretAtEnd(visibleEl);
                }
            }

            if (val.includes(' ') || val.includes('\n')) {
                const match = val.match(/^(.*[\s\n]+)([^\s\n]*)$/);
                if (match) {
                    hiddenEl.value += match[1];
                    visibleEl.innerText = match[2];
                    window.placeCaretAtEnd(visibleEl);
                }
            }
            window.updateOneShotStats();
            
            const box = document.getElementById('oneshot-fs-preview-box');
            if (!box.classList.contains('hidden')) {
                box.innerText = hiddenEl.value + visibleEl.innerText;
            }
        }

        window.placeCaretAtEnd = function(el) {
            el.focus();
            if (typeof window.getSelection !== "undefined" && typeof document.createRange !== "undefined") {
                const range = document.createRange();
                range.selectNodeContents(el);
                range.collapse(false);
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
            }
        }

        window.processImageFile = function(file, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    
                    const MAX_DIMENSION = 1200;
                    if (width > height && width > MAX_DIMENSION) {
                        height = Math.round(height * MAX_DIMENSION / width);
                        width = MAX_DIMENSION;
                    } else if (height > MAX_DIMENSION) {
                        width = Math.round(width * MAX_DIMENSION / height);
                        height = MAX_DIMENSION;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const dataURL = canvas.toDataURL('image/jpeg', 0.6);
                    callback(dataURL, file.name, 'image/jpeg');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        window.handleFileUpload = function(event, type) {
            const files = event.target.files;
            if (!files) return;

            Array.from(files).forEach(file => {
                if (type === 'image') {
                    window.processImageFile(file, (dataUrl, fileName, mimeType) => {
                        currentAttachments.push({
                            id: Date.now() + Math.random(),
                            type: 'image',
                            name: fileName,
                            data: dataUrl,
                            mimeType: mimeType
                        });
                        window.renderAttachmentPreview();
                    });
                } else {
                    // Batas ukuran 800KB agar tidak overload Firestore document size limit (1MB)
                    if (file.size > 800 * 1024) { 
                        window.showToast(`File ${file.name} terlalu besar (Maks 800KB).`);
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        currentAttachments.push({
                            id: Date.now() + Math.random(),
                            type: 'file',
                            name: file.name,
                            data: e.target.result,
                            mimeType: file.type
                        });
                        window.renderAttachmentPreview();
                    };
                    reader.readAsDataURL(file);
                }
            });
            event.target.value = ''; 
        }

        window.saveNote = async function() {
            const id = document.getElementById('note-id').value;
            const category = document.getElementById('note-category').value;
            const titleInput = document.getElementById('note-title').value.trim();
            
            let content = "";
            let rawTextForTitle = "";

            if (category === 'carousel') {
                const carouselData = [];
                let parsedOld = [];
                
                if (id) {
                    const existingNote = notes.find(n => n.id == id);
                    if (existingNote) {
                        try { parsedOld = JSON.parse(existingNote.content); } catch(e){}
                    }
                }

                const oldRegulars = parsedOld.filter(c => !c.isCaption);
                const oldCaption = parsedOld.find(c => c.isCaption);

                let oldIdx = 0;
                for(let i=1; i<=currentCarouselCount; i++) {
                    const elTxt = document.getElementById(`car-content-${i}`);
                    const txt = elTxt ? elTxt.value.trim() : "";
                    const img = currentCarouselImages[i] || null;
                    
                    carouselData.push({ 
                        id: oldRegulars[oldIdx]?.id || (Date.now() + i + Math.random()),
                        content: txt,
                        image: img,
                        isCaption: false
                    });
                    if (!rawTextForTitle && txt) rawTextForTitle = txt; 
                    oldIdx++;
                }
                
                const capTxtEl = document.getElementById('car-content-caption');
                const capTxt = capTxtEl ? capTxtEl.value.trim() : "";
                const capImg = currentCarouselImages['caption'] || null;
                
                carouselData.push({
                    id: oldCaption?.id || (Date.now() + 999 + Math.random()),
                    content: capTxt,
                    image: capImg,
                    isCaption: true
                });
                if (!rawTextForTitle && capTxt) rawTextForTitle = capTxt;
                
                content = JSON.stringify(carouselData);

            } else if (category === 'mypassword') {
                const pwData = {
                    username: document.getElementById('pw-username').value.trim(),
                    password: document.getElementById('pw-password').value.trim(),
                    link: document.getElementById('pw-link').value.trim()
                };
                content = JSON.stringify(pwData);
                rawTextForTitle = pwData.username || pwData.link || "My Password";

            } else if (category === 'revisi') {
                const revData = {
                    tujuan: document.getElementById('rev-tujuan').value.trim(),
                    content: document.getElementById('rev-content').value.trim()
                };
                content = JSON.stringify(revData);
                rawTextForTitle = revData.tujuan || revData.content || "Revisi";

            } else if (category === 'oneshot') {
                const hiddenVal = document.getElementById('oneshot-fs-hidden').value;
                const visibleVal = document.getElementById('oneshot-fs-visible').innerText;
                content = hiddenVal + visibleVal;
                rawTextForTitle = content;

            } else {
                content = document.getElementById('note-content').value.trim();
                rawTextForTitle = content;
            }

            let title = titleInput;
            if (!title) {
                if (rawTextForTitle) {
                    let cleanText = rawTextForTitle.replace(/^- \[[xX ]\]\s*/i, '');
                    const words = cleanText.trim().split(/\s+/);
                    title = words.slice(0, 4).join(' '); 
                    if (words.length > 4) title += '...';
                } else {
                    title = "Tanpa Judul";
                }

        window.executeCopy = function(withTitle) {
            if (noteIdToCopy === null) return;
            const note = notes.find(n => n.id === noteIdToCopy);
            if (!note) {
                window.closeCopyOptions();
                return;
            }
            
            let textToCopy = "";
            if (withTitle && note.title) {
                textToCopy += `${note.title}\n\n`;
            }
            
            if (note.category === 'carousel') {
                try {
                    let items = JSON.parse(note.content);
                    let numIdx = 1;
                    const cardTexts = items.map((it) => {
                        const title = it.isCaption ? 'Caption' : `Kartu ${numIdx++}`;
                        return `[${title}]\n${it.content}`;
                    }).join('\n\n---\n\n');
                    textToCopy += cardTexts;
                } catch(e) {}
            } else if (note.category === 'mypassword') {
                try {
                    let pw = JSON.parse(note.content);
                    textToCopy += `Username: ${pw.username}\nPassword: ${pw.password}\nLink: ${pw.link}`;
                } catch(e) {}
            } else if (note.category === 'revisi') {
                try {
                    let rev = JSON.parse(note.content);
                    textToCopy += `Tujuan Revisi: ${rev.tujuan}\n\nTeks:\n${rev.content}`;
                } catch(e) {}
            } else {
                textToCopy += note.content;
            }
            
            const textarea = document.createElement('textarea');
            textarea.value = textToCopy.trim();
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                document.execCommand('copy');
                window.showToast("Teks berhasil disalin!");
            } catch (err) {
                window.showToast("Gagal menyalin teks.");
            }
            
            document.body.removeChild(textarea);
            window.closeCopyOptions();
        }

        window.visitLink = function(id) {
            const note = notes.find(n => n.id === id);
            if (!note) return;
            
            if (note.category === 'mypassword') {
                try {
                    const pw = JSON.parse(note.content);
                    if (pw.link) {
                        let url = pw.link;
                        if (!url.match(/^https?:\/\//i)) { url = 'https://' + url; }
                        window.open(url, '_blank');
                        window.showToast("Membuka tautan...");
                        return;
                    }
                } catch(e) {}
                window.showToast("Tidak ditemukan link pada password ini.");
                return;
            }

            const urlRegex = /(https?:\/\/[^\s]+)/g;
            const matches = note.content.match(urlRegex);
            
            if (matches && matches.length > 0) {
                window.open(matches[0], '_blank');
                window.showToast("Membuka tautan...");
            } else {
                window.showToast("Tidak ditemukan link (http/https) pada catatan ini.");
            }
        }

        window.exportData = function() {
            if (notes.length === 0) return window.showToast("Tidak ada data untuk diekspor!");
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(notes));
            const downloadNode = document.createElement('a');
            downloadNode.setAttribute("href", dataStr);
            downloadNode.setAttribute("download", `MyNotes_Backup_${new Date().toISOString().slice(0,10)}.json`);
            document.body.appendChild(downloadNode);
            downloadNode.click();
            downloadNode.remove();
            window.showToast("Berhasil diekspor!");
        }

        window.importData = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const importedNotes = JSON.parse(e.target.result);
                    if (Array.isArray(importedNotes)) {
                        window.showToast("Mentransfer ke Cloud (mohon tunggu)...");
                        for (const item of importedNotes) {
                            // Menghindari duplikat berdasarkan timestamp (opsional, tapi disarankan)
                            const exists = notes.some(n => n.timestamp === item.timestamp && n.title === item.title);
                            if (!exists) {
                                await addDoc(notesCollection, {
                                    title: item.title,
                                    category: item.category || 'copas',
                                    content: item.content,
                                    attachments: item.attachments || [],
                                    timestamp: item.timestamp || Date.now(),
                                    updatedAt: item.updatedAt || Date.now()
                                });
                            }
                        }
                        window.showToast("Data berhasil diimpor ke Cloud!");
                    } else { window.showToast("Format file tidak valid."); }
                } catch (err) { 
                    window.showToast("Gagal membaca file JSON."); 
                }
                event.target.value = ''; 
            };
            reader.readAsText(file);
        }

        window.escapeHTML = function(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag] || tag));
        }

        window.formatTime = function(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            return date.toLocaleDateString('id-ID', {
                day: 'numeric', month: 'short', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            }).replace(/\./g, ':');
        }

                                <i class="fa-regular fa-copy text-[13px]"></i>
                            </button>
                            <button onclick="window.openModal('${note.id}'); event.stopPropagation();" class="w-8 h-8 flex items-center justify-center text-blue-500 dark:text-blue-400 active:bg-blue-50 dark:active:bg-blue-900/30 rounded-full transition" title="Edit Catatan">
                                <i class="fa-solid fa-pen text-[13px]"></i>
                            </button>
                            <button onclick="window.openDeleteAlert('${note.id}'); event.stopPropagation();" class="w-8 h-8 flex items-center justify-center text-red-500 dark:text-red-400 active:bg-red-50 dark:active:bg-red-900/30 rounded-full transition" title="Hapus Catatan">
                                <i class="fa-solid fa-trash text-[13px]"></i>
                            </button>
                            <div class="w-px h-4 bg-gray-200 dark:bg-gray-600 mx-1"></div>
                            <i class="fa-solid fa-chevron-down text-gray-400 dark:text-gray-500 text-sm chevron-icon pl-1 ${openClass}" id="note-icon-${note.id}"></i>
                        </div>
                    </div>
                    
                    <div class="accordion-content border-t border-gray-100 dark:border-gray-700 ${openClass}" id="note-body-${note.id}">
                        <div class="accordion-inner bg-gray-50/50 dark:bg-gray-800/50">
                            <div class="p-4">
                                ${imagesHtml}
                                ${previewContent}
                                ${filesHtml}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        window.renderNotes = function() {
            const container = document.getElementById('notes-container');
            container.innerHTML = '';

            if (notes.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 pt-20">
                        <i class="fa-regular fa-folder-open text-6xl mb-4 text-gray-300 dark:text-gray-600"></i>
                        <p class="font-medium">Belum ada catatan.</p>
                        <p class="text-sm">Klik tombol + untuk menambah.</p>
                    </div>`;
                return;
            }

            let html = '';

            if (isGrouped) {
                html += `<div class="columns-1 lg:columns-2 xl:columns-3 gap-5 md:gap-6">`;
                
                Object.keys(categories).forEach(catKey => {
                    const catNotes = notes.filter(n => n.category === catKey).sort((a,b) => b.timestamp - a.timestamp);
                    if (catNotes.length > 0) {
                        const config = categories[catKey];
                        const isCatOpen = openCategories.has(catKey);
                        const openClass = isCatOpen ? "open" : "";
                        
                        html += `
                            <div class="mb-5 md:mb-6 break-inside-avoid inline-block w-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl shadow-sm overflow-hidden transition-colors">
                                <div class="flex justify-between items-center px-4 py-3.5 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700/50 active:bg-gray-100 dark:active:bg-gray-700 transition-colors" onclick="window.toggleCategory('${catKey}')">
                                    <div class="flex items-center">
                                        <div class="w-8 h-8 rounded-lg ${config.bg} ${config.color} flex items-center justify-center mr-3">
                                            ${config.icon}
                                        </div>
                                        <h2 class="text-[16px] font-bold text-gray-800 dark:text-white">${config.title}</h2>
                                        <span class="ml-2 bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400 px-2 py-0.5 rounded-full text-xs font-bold">${catNotes.length}</span>
                                    </div>
                                    <i class="fa-solid fa-chevron-down text-gray-400 dark:text-gray-500 text-sm chevron-icon ${openClass}" id="cat-icon-${catKey}"></i>
                                </div>
                                
                                <div class="accordion-content ${openClass}" id="cat-body-${catKey}">
                                    <div class="accordion-inner bg-gray-50/50 dark:bg-gray-900/30 border-t border-gray-100 dark:border-gray-700">
                                        <div class="p-3.5 pb-0">
                        `;

                        catNotes.forEach(note => { html += window.buildNoteCard(note, false); });

                        html += `       </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                });
                
                html += `</div>`;
            } else {
                const allNotes = [...notes]; // Sudah diurutkan di fungsi fetch
                html += `<div class="columns-1 sm:columns-2 lg:columns-3 xl:columns-4 gap-4 md:gap-5 lg:gap-6 pt-2">`;
                allNotes.forEach(note => { html += window.buildNoteCard(note, true); });
                html += `</div>`;
            }

            container.innerHTML = html;
        }
    </script>
</body>
</html>
