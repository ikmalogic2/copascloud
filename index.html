<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>i-cloud</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: '-apple-system', BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        ::-webkit-scrollbar { width: 0px; height: 0px; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Animasi Modal */
        .modal-enter { transform: translateY(100%); opacity: 0; transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.4s ease; }
        .modal-active { transform: translateY(0); opacity: 1; }
        
        /* Glassmorphism Header iOS */
        .glass-header {
            background-color: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .dark .glass-header {
            background-color: rgba(0, 0, 0, 0.75);
        }

        /* Akordion / Collapse */
        .accordion-content {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .accordion-content.open { grid-template-rows: 1fr; }
        .accordion-inner { overflow: hidden; }

        .chevron-icon { transition: transform 0.3s ease; }
        .chevron-icon.open { transform: rotate(180deg); }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden bg-[#F2F2F7] dark:bg-black transition-colors duration-300" onclick="window.closeAllActionMenus()">

    <!-- Header iOS Style -->
    <header class="glass-header fixed top-0 w-full z-20 h-14 flex items-center justify-between px-3 md:px-6 lg:px-8 border-b border-black/5 dark:border-white/10">
        <div class="flex items-center w-1/3">
            <button onclick="window.undo()" id="btn-undo" class="w-10 h-10 flex items-center justify-start text-[#007AFF] disabled:opacity-30 disabled:cursor-not-allowed transition" title="Undo (Batal)">
                <i class="fa-solid fa-chevron-left text-[20px]"></i>
            </button>
            <button onclick="window.redo()" id="btn-redo" class="w-10 h-10 flex items-center justify-start text-[#007AFF] disabled:opacity-30 disabled:cursor-not-allowed transition" title="Redo (Ulangi)">
                <i class="fa-solid fa-chevron-right text-[20px]"></i>
            </button>
        </div>
        
        <div class="flex-1 flex justify-center items-center">
            <i id="header-cloud-icon" class="fa-solid fa-cloud text-gray-400 text-[20px] mr-1.5 transition-colors duration-500"></i>
            <h1 class="text-[17px] font-semibold text-black dark:text-white tracking-tight">i-cloud</h1>
        </div>
        
        <div class="flex items-center justify-end w-1/3 space-x-1">
            <button onclick="window.toggleTheme()" id="btn-theme" class="w-9 h-9 flex items-center justify-center text-yellow-500 hover:opacity-70 transition text-[18px]" title="Ubah Tema">
                <i class="fa-solid fa-sun" id="theme-icon"></i>
            </button>
            <button onclick="window.toggleGroupView()" id="btn-group" class="w-9 h-9 flex items-center justify-center text-[#007AFF] hover:opacity-70 transition text-[18px]" title="Kategorikan">
                <i class="fa-solid fa-layer-group"></i>
            </button>
            <button onclick="window.openModal()" class="w-9 h-9 flex items-center justify-end text-[#007AFF] hover:opacity-70 transition text-[22px]" title="Tambah Catatan">
                <i class="fa-solid fa-pen-to-square"></i>
            </button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto hide-scrollbar pt-20 pb-10 px-4 lg:px-8" id="main-area">
        <div id="notes-container" class="w-full max-w-[1600px] mx-auto">
            <!-- Catatan akan di-render di sini via JavaScript -->
        </div>
    </main>

    <!-- MODAL TAMBAH/EDIT CATATAN -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/40 dark:bg-black/60 backdrop-blur-sm z-30 hidden opacity-0 transition-opacity duration-300" onclick="window.closeModal()"></div>
    
    <div id="modal" class="fixed inset-x-0 bottom-0 z-40 bg-white dark:bg-[#1C1C1E] rounded-t-[32px] h-[85vh] md:max-w-2xl md:mx-auto shadow-[0_-10px_40px_rgba(0,0,0,0.2)] modal-enter flex flex-col transition-colors border-t border-black/5 dark:border-white/10">
        <div class="flex justify-between items-center px-5 py-4 border-b border-black/5 dark:border-white/10 bg-white dark:bg-[#1C1C1E] rounded-t-[32px] shrink-0">
            <button onclick="window.closeModal()" class="text-[#007AFF] text-[17px] font-normal hover:opacity-70">Batal</button>
            <h2 class="font-semibold text-[17px] text-black dark:text-white tracking-tight" id="modal-title">Buat Catatan</h2>
            <button onclick="window.saveNote()" class="text-[#007AFF] text-[17px] font-semibold hover:opacity-70">Simpan</button>
        </div>
        
        <div class="p-5 flex-1 overflow-y-auto hide-scrollbar bg-gray-50/50 dark:bg-black/20">
            <input type="hidden" id="note-id">
            
            <div class="mb-4">
                <label class="block text-[13px] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1.5 ml-1">Kategori</label>
                <div class="relative">
                    <select id="note-category" onchange="window.toggleInputFields()" class="w-full appearance-none bg-white dark:bg-[#2C2C2E] border border-black/5 dark:border-white/10 text-black dark:text-white py-3.5 px-4 rounded-2xl text-[16px] font-medium focus:outline-none focus:ring-2 focus:ring-[#007AFF] transition-colors shadow-sm">
                        <!-- Lengkap Semua Kategori -->
                        <option value="copas" selected>📋 Copas</option>
                        <option value="carousel">🗂️ Carousel Notes</option>
                        <option value="mypassword">🔑 My Password</option>
                        <option value="mypurchase">🛍️ My Purchase</option>
                        <option value="revisi">🔄 Revisi</option>
                        <option value="ideation">💡 Ideation</option>
                        <option value="oneshot">🎯 One Shot</option>
                        <option value="error">🐛 Error Book</option>
                        <option value="myprompt">⌨️ My Prompt</option>
                        <option value="gemsgpt">💎 GEMS/GPT</option>
                        <option value="myinstruction">💻 Instruction</option>
                        <option value="mylink">🔗 My Link</option>
                        <option value="memo">📝 Memo Tasks</option>
                        <option value="jenisfont">🔤 Jenis Font</option>
                        <option value="brandkit">🎨 Brand Kit</option>
                        <option value="jurnal">📓 Jurnal</option>
                        <option value="laporan">📊 Laporan</option>
                        <option value="screenshot">📱 Screenshot</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-400">
                        <i class="fa-solid fa-chevron-down text-sm"></i>
                    </div>
                </div>
            </div>

            <div class="mb-4 bg-white dark:bg-[#2C2C2E] rounded-2xl border border-black/5 dark:border-white/10 shadow-sm overflow-hidden px-4">
                <input type="text" id="note-title" placeholder="Judul Catatan..." class="w-full text-[18px] font-bold focus:outline-none text-black dark:text-white bg-transparent placeholder-gray-400 dark:placeholder-gray-500 py-3.5">
            </div>

            <div class="mb-4">
                <div class="flex space-x-2 mb-2">
                    <button onclick="document.getElementById('attach-image').click()" class="bg-white dark:bg-[#2C2C2E] border border-black/5 dark:border-white/10 hover:bg-gray-50 dark:hover:bg-white/5 text-[#007AFF] px-4 py-2.5 rounded-[14px] text-[15px] font-medium transition shadow-sm flex items-center"><i class="fa-solid fa-image mr-2 text-[18px]"></i> Gambar</button>
                    <button onclick="document.getElementById('attach-file').click()" class="bg-white dark:bg-[#2C2C2E] border border-black/5 dark:border-white/10 hover:bg-gray-50 dark:hover:bg-white/5 text-[#AF52DE] px-4 py-2.5 rounded-[14px] text-[15px] font-medium transition shadow-sm flex items-center"><i class="fa-solid fa-paperclip mr-2 text-[18px]"></i> File</button>
                    <input type="file" id="attach-image" accept="image/*" class="hidden" onchange="window.handleFileUpload(event, 'image')" multiple>
                    <input type="file" id="attach-file" accept=".txt,.pdf,.html,.json,.doc,.docx,.xls,.xlsx,.csv" class="hidden" onchange="window.handleFileUpload(event, 'file')" multiple>
                </div>
                <div id="attachment-preview" class="flex flex-wrap gap-2"></div>
            </div>
            
            <!-- Mode Teks Biasa -->
            <div id="normal-input-container" class="w-full flex-col flex h-56">
                <textarea id="note-content" placeholder="Ketik isi catatan di sini... (Untuk mode Memo, gunakan format '- [ ] Tugas' agar menjadi ceklis otomatis)" class="w-full h-full text-[16px] focus:outline-none text-black dark:text-white placeholder-gray-400 dark:placeholder-gray-500 resize-none leading-relaxed bg-white dark:bg-[#2C2C2E] p-4 rounded-2xl border border-black/5 dark:border-white/10 shadow-sm"></textarea>
            </div>

            <!-- Mode Carousel -->
            <div id="carousel-input-container" class="w-full flex-col hidden pb-5">
                <div class="flex justify-between items-center mb-3">
                    <label class="text-[13px] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider ml-1">Isi Kartu</label>
                    <div class="flex items-center space-x-2 bg-white dark:bg-[#2C2C2E] rounded-xl p-1 shadow-sm border border-black/5 dark:border-white/10">
                        <button onclick="window.changeCarouselCount(-1)" class="w-8 h-8 flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-white/10 rounded-lg active:scale-95 transition-all"><i class="fa-solid fa-minus text-sm"></i></button>
                        <span id="carousel-count-display" class="text-[16px] font-bold text-black dark:text-white w-6 text-center">3</span>
                        <button onclick="window.changeCarouselCount(1)" class="w-8 h-8 flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-white/10 rounded-lg active:scale-95 transition-all"><i class="fa-solid fa-plus text-sm"></i></button>
                    </div>
                </div>
                <div id="carousel-cards-wrapper" class="space-y-4"></div>
            </div>
            
            <!-- Mode My Password -->
            <div id="mypassword-input-container" class="w-full flex-col hidden space-y-4 pb-5">
                <input type="text" id="pw-username" placeholder="Username / Email" class="w-full bg-white dark:bg-[#2C2C2E] border border-black/5 dark:border-white/10 p-4 rounded-2xl text-[16px] text-black dark:text-white focus:outline-none focus:ring-2 focus:ring-[#007AFF] shadow-sm">
                <input type="text" id="pw-password" placeholder="Password" class="w-full bg-white dark:bg-[#2C2C2E] border border-black/5 dark:border-white/10 p-4 rounded-2xl text-[16px] text-black dark:text-white focus:outline-none focus:ring-2 focus:ring-[#007AFF] shadow-sm font-mono">
                <input type="url" id="pw-link" placeholder="Link (https://...)" class="w-full bg-white dark:bg-[#2C2C2E] border border-black/5 dark:border-white/10 p-4 rounded-2xl text-[16px] text-black dark:text-white focus:outline-none focus:ring-2 focus:ring-[#007AFF] shadow-sm">
            </div>

            <!-- Mode My Purchase -->
            <div id="mypurchase-input-container" class="w-full flex-col hidden space-y-4 pb-5">
                <input type="text" id="pur-name" placeholder="Nama Produk" class="w-full bg-white dark:bg-[#2C2C2E] border border-black/5 dark:border-white/10 p-4 rounded-2xl text-[16px] text-black dark:text-white focus:outline-none focus:ring-2 focus:ring-[#007AFF] shadow-sm">
                <input type="text" id="pur-owner" placeholder="Nama Toko / Owner" class="w-full bg-white dark:bg-[#2C2C2E] border border-black/5 dark:border-white/10 p-4 rounded-2xl text-[16px] text-black dark:text-white focus:outline-none focus:ring-2 focus:ring-[#007AFF] shadow-sm">
                <input type="text" id="pur-price" placeholder="Harga Beli (Opsional)" class="w-full bg-white dark:bg-[#2C2C2E] border border-black/5 dark:border-white/10 p-4 rounded-2xl text-[16px] text-black dark:text-white focus:outline-none focus:ring-2 focus:ring-[#007AFF] shadow-sm">
                <input type="url" id="pur-link" placeholder="Link Produk (Opsional)" class="w-full bg-white dark:bg-[#2C2C2E] border border-black/5 dark:border-white/10 p-4 rounded-2xl text-[16px] text-black dark:text-white focus:outline-none focus:ring-2 focus:ring-[#007AFF] shadow-sm">
                <textarea id="pur-notes" placeholder="Catatan Tambahan..." class="w-full h-32 bg-white dark:bg-[#2C2C2E] border border-black/5 dark:border-white/10 p-4 rounded-2xl text-[16px] text-black dark:text-white focus:outline-none focus:ring-2 focus:ring-[#007AFF] shadow-sm resize-none"></textarea>
            </div>

            <!-- Mode Instruction -->
            <div id="instruction-input-container" class="w-full flex-col hidden space-y-4 pb-5">
                <input type="url" id="inst-link" placeholder="Link Referensi (Opsional)" class="w-full bg-white dark:bg-[#2C2C2E] border border-black/5 dark:border-white/10 p-4 rounded-2xl text-[16px] text-black dark:text-white focus:outline-none focus:ring-2 focus:ring-[#007AFF] shadow-sm">
                <textarea id="inst-content" placeholder="Tulis instruksi langkah demi langkah di sini..." class="w-full h-48 bg-white dark:bg-[#2C2C2E] border border-black/5 dark:border-white/10 p-4 rounded-2xl text-[16px] text-black dark:text-white focus:outline-none focus:ring-2 focus:ring-[#007AFF] shadow-sm resize-none"></textarea>
            </div>

            <!-- Mode Revisi -->
            <div id="revisi-input-container" class="w-full flex-col hidden space-y-4 pb-5">
                <input type="text" id="rev-tujuan" placeholder="Tujuan Revisi (Misal: Perbaiki grammar...)" class="w-full bg-white dark:bg-[#2C2C2E] border border-black/5 dark:border-white/10 p-4 rounded-2xl text-[16px] text-black dark:text-white focus:outline-none focus:ring-2 focus:ring-[#007AFF] shadow-sm">
                <textarea id="rev-content" placeholder="Teks Utama yang direvisi..." class="w-full h-40 bg-white dark:bg-[#2C2C2E] border border-black/5 dark:border-white/10 p-4 rounded-2xl text-[16px] text-black dark:text-white focus:outline-none focus:ring-2 focus:ring-[#007AFF] shadow-sm resize-none leading-relaxed"></textarea>
            </div>

            <!-- Mode One Shot -->
            <div id="oneshot-input-container" class="w-full flex-col hidden pb-5 items-center justify-center py-6">
                <div class="w-20 h-20 bg-[#FF3B30]/10 dark:bg-[#FF3B30]/20 text-[#FF3B30] rounded-full flex items-center justify-center text-4xl mb-4">🎯</div>
                <h3 class="text-[18px] font-bold text-black dark:text-white mb-2">Mode Anti-Distraksi</h3>
                <p class="text-center text-[14px] text-gray-500 dark:text-gray-400 mb-6 px-4 leading-relaxed">Teks akan otomatis hilang per kata saat Anda menekan spasi untuk melatih aliran ide tanpa henti.</p>
                <button onclick="window.openOneShotFullscreen()" class="bg-[#FF3B30] hover:bg-[#FF453A] text-white px-8 py-3.5 rounded-full font-semibold transition-colors shadow-md active:scale-95 w-full md:w-auto flex items-center justify-center text-[16px]">
                    <i class="fa-solid fa-expand mr-2"></i> Buka Kanvas
                </button>
            </div>
        </div>
    </div>

    <!-- CUSTOM DELETE ALERT OVERLAY (iOS Style) -->
    <div id="delete-alert-overlay" class="fixed inset-0 bg-black/40 dark:bg-black/60 backdrop-blur-sm z-50 hidden opacity-0 transition-opacity duration-300 flex items-center justify-center p-4">
        <div id="delete-alert-box" class="bg-white/90 dark:bg-[#1E1E1E]/90 backdrop-blur-xl rounded-[20px] w-full max-w-[270px] overflow-hidden shadow-2xl transform scale-95 transition-transform duration-300 border border-white/20 dark:border-white/10">
            <div class="pt-5 pb-4 px-4 text-center">
                <h3 class="text-[17px] font-semibold text-black dark:text-white leading-tight mb-1">Hapus Catatan?</h3>
                <p class="text-[13px] text-black/70 dark:text-white/70 leading-tight">Tindakan ini tidak dapat dibatalkan.</p>
            </div>
            <div class="flex border-t border-black/10 dark:border-white/10">
                <button onclick="window.closeDeleteAlert()" class="flex-1 py-3 text-[17px] text-[#007AFF] font-normal hover:bg-black/5 dark:hover:bg-white/5 transition-colors border-r border-black/10 dark:border-white/10">Batal</button>
                <button onclick="window.confirmDelete()" class="flex-1 py-3 text-[17px] text-[#FF3B30] font-semibold hover:bg-black/5 dark:hover:bg-white/5 transition-colors">Hapus</button>
            </div>
        </div>
    </div>

    <!-- CUSTOM COPY OPTIONS OVERLAY (iOS Style) -->
    <div id="copy-options-overlay" class="fixed inset-0 bg-black/40 dark:bg-black/60 backdrop-blur-sm z-50 hidden opacity-0 transition-opacity duration-300 flex items-center justify-center p-4">
        <div id="copy-options-box" class="bg-white/90 dark:bg-[#1E1E1E]/90 backdrop-blur-xl rounded-[20px] w-full max-w-[270px] overflow-hidden shadow-2xl transform scale-95 transition-transform duration-300 border border-white/20 dark:border-white/10">
            <div class="pt-5 pb-4 px-4 text-center">
                <h3 class="text-[17px] font-semibold text-black dark:text-white leading-tight">Opsi Salin</h3>
            </div>
            <div class="flex flex-col border-t border-black/10 dark:border-white/10">
                <button onclick="window.executeCopy(true)" class="py-3 text-[17px] text-[#007AFF] font-normal hover:bg-black/5 dark:hover:bg-white/5 transition-colors border-b border-black/10 dark:border-white/10">Beserta Judul</button>
                <button onclick="window.executeCopy(false)" class="py-3 text-[17px] text-[#007AFF] font-normal hover:bg-black/5 dark:hover:bg-white/5 transition-colors border-b border-black/10 dark:border-white/10">Tanpa Judul</button>
                <button onclick="window.closeCopyOptions()" class="py-3 text-[17px] text-[#FF3B30] font-semibold hover:bg-black/5 dark:hover:bg-white/5 transition-colors">Batal</button>
            </div>
        </div>
    </div>

    <!-- TOAST NOTIFICATION -->
    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-800 dark:bg-white text-white dark:text-gray-900 px-5 py-3 rounded-full shadow-lg transition-all duration-300 translate-y-20 opacity-0 z-50 flex items-center pointer-events-none">
        <i class="fa-solid fa-check-circle text-[#34C759] text-lg mr-3"></i>
        <span id="toast-message" class="text-[14px] font-medium tracking-wide">Notifikasi</span>
    </div>

    <!-- CUSTOM ONE SHOT FULLSCREEN KANVAS -->
    <div id="oneshot-fullscreen-overlay" class="fixed inset-0 bg-[#F2F2F7] dark:bg-black z-[100] hidden flex-col transition-opacity duration-300 opacity-0">
        <div class="absolute top-6 left-6 right-6 flex justify-between items-center z-30 pointer-events-none">
            <div id="oneshot-fs-stats" class="text-[15px] font-semibold text-[#FF3B30] bg-[#FF3B30]/10 px-4 py-2 rounded-full backdrop-blur-md pointer-events-auto">0 Kata</div>
            <button onclick="window.closeOneShotFullscreen()" class="w-10 h-10 bg-white/80 dark:bg-[#1C1C1E]/80 backdrop-blur-md border border-black/5 dark:border-white/10 rounded-full shadow-md flex items-center justify-center text-black dark:text-white hover:opacity-70 transition pointer-events-auto">
                <i class="fa-solid fa-check text-[18px]"></i>
            </button>
        </div>
        <textarea id="oneshot-fs-hidden" class="hidden"></textarea>
        <div class="flex-1 flex items-center justify-center p-8 relative overflow-hidden z-10">
            <div id="oneshot-fs-visible" contenteditable="true" autocapitalize="none" oninput="window.handleOneShotInput(event)" class="w-full max-w-5xl mx-auto text-center text-5xl md:text-[6vw] font-black text-black dark:text-white focus:outline-none empty:before:content-[attr(data-placeholder)] empty:before:text-gray-300 dark:empty:before:text-gray-700 leading-tight break-words" data-placeholder="Ketik di sini..."></div>
        </div>
        <div id="oneshot-fs-preview-box" class="absolute inset-x-6 top-24 bottom-28 md:inset-x-24 md:top-32 md:bottom-32 bg-white/90 dark:bg-[#1C1C1E]/90 backdrop-blur-xl rounded-[32px] shadow-2xl p-8 hidden overflow-y-auto text-[18px] md:text-2xl leading-relaxed text-black dark:text-white z-20 border border-black/5 dark:border-white/10"></div>
        <div class="absolute bottom-8 left-1/2 transform -translate-x-1/2 z-30 pointer-events-auto">
            <button onclick="window.toggleOneShotPreview()" id="btn-oneshot-preview" class="bg-black dark:bg-white text-white dark:text-black px-6 py-3 rounded-full font-semibold shadow-lg hover:opacity-80 transition flex items-center text-[15px]">
                <i class="fa-solid fa-eye mr-2"></i> <span id="oneshot-preview-btn-text">Intip Teks</span>
            </button>
        </div>
    </div>

    <input type="file" id="carousel-image-input" accept="image/*" class="hidden" onchange="window.handleCarouselImageUpload(event)">
    <div id="edit-card-overlay" class="fixed inset-0 bg-black/40 dark:bg-black/60 backdrop-blur-sm z-50 hidden opacity-0 transition-opacity duration-300 flex items-center justify-center p-4">
        <div id="edit-card-box" class="bg-white/90 dark:bg-[#1E1E1E]/90 backdrop-blur-xl rounded-[20px] w-full max-w-sm overflow-hidden shadow-2xl transform scale-95 transition-transform duration-300 flex flex-col border border-white/20 dark:border-white/10">
            <div class="px-5 py-4 border-b border-black/10 dark:border-white/10 flex justify-center items-center">
                <h3 class="font-semibold text-[17px] text-black dark:text-white">Edit Kartu</h3>
            </div>
            <div class="p-4 flex-1">
                <textarea id="edit-card-textarea" placeholder="Isi kartu..." class="w-full h-32 bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 p-3 rounded-[14px] text-[15px] text-black dark:text-white focus:outline-none focus:ring-2 focus:ring-[#007AFF] resize-none"></textarea>
            </div>
            <div class="flex border-t border-black/10 dark:border-white/10">
                <button onclick="window.closeEditCarouselCardModal()" class="flex-1 py-3 text-[17px] text-[#007AFF] font-normal border-r border-black/10 dark:border-white/10">Batal</button>
                <button onclick="window.saveEditCarouselCard()" class="flex-1 py-3 text-[17px] text-[#007AFF] font-semibold">Simpan</button>
            </div>
        </div>
    </div>

    <script>
        const categories = {
            copas: { title: "Copas", icon: "📋", color: "text-[#34C759]", bg: "bg-[#34C759]/10" },
            carousel: { title: "Carousel Notes", icon: "🗂️", color: "text-[#FF2D55]", bg: "bg-[#FF2D55]/10" },
            mypassword: { title: "My Password", icon: "🔑", color: "text-[#5AC8FA]", bg: "bg-[#5AC8FA]/10" },
            mypurchase: { title: "My Purchase", icon: "🛍️", color: "text-[#FF9500]", bg: "bg-[#FF9500]/10" },

            document.getElementById('btn-redo').disabled = redoStack.length === 0;
        }

        window.undo = function() {
            if (historyStack.length === 0) return;
            redoStack.push(JSON.stringify(window.notes));
            const prevState = historyStack.pop();
            window.notes = JSON.parse(prevState);
            window.saveToStorage(false); 
            if (window.isCloudReady) window.syncAllToCloud(window.notes); // Sinkronisasi Cloud
            window.renderNotes();
            window.updateUndoRedoButtons();
            window.showToast("Batal (Undo)");
        }

        window.redo = function() {
            if (redoStack.length === 0) return;
            historyStack.push(JSON.stringify(window.notes));
            const nextState = redoStack.pop();
            window.notes = JSON.parse(nextState);
            window.saveToStorage(false);
            if (window.isCloudReady) window.syncAllToCloud(window.notes); // Sinkronisasi Cloud
            window.renderNotes();
            window.updateUndoRedoButtons();
            window.showToast("Ulangi (Redo)");

        window.processImageFile = function(file, callback) {
            window.showToast("Memproses gambar...");
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    
                    // Lebih Agresif: Max 600px untuk menghemat ruang Cloud (Batas Firestore 1MB/catatan)
                    const MAX_DIMENSION = 600; 
                    if (width > height && width > MAX_DIMENSION) {
                        height = Math.round(height * MAX_DIMENSION / width);
                        width = MAX_DIMENSION;
                    } else if (height > MAX_DIMENSION) {
                        width = Math.round(width * MAX_DIMENSION / height);
                        height = MAX_DIMENSION;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = "#FFFFFF"; 
                    ctx.fillRect(0, 0, width, height);
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Kualitas 40% (0.4) agar lebih ringan
                    const dataURL = canvas.toDataURL('image/jpeg', 0.4);
                    
                    // Safety check ukuran base64 (~850KB limit)
                    if (dataURL.length > 850 * 1024) {
                        window.showToast("Gambar terlalu besar/kompleks. Mohon potong (crop).");
                        return;
                    }
                    callback(dataURL, file.name, 'image/jpeg');
                };
                img.onerror = () => window.showToast("Format tidak didukung.");
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        window.saveNote = function() {
            window.saveStateToHistory(); 

            const id = document.getElementById('note-id').value;
            const category = document.getElementById('note-category').value;
            const titleInput = document.getElementById('note-title').value.trim();
            
            let content = "";
            let rawTextForTitle = "";

            if (category === 'carousel') {
                const carouselData = [];
                let parsedOld = [];
                if (id) {
                    const existingNote = window.notes.find(n => String(n.id) === String(id));
                    if (existingNote) { try { parsedOld = JSON.parse(existingNote.content); } catch(e){} }
                }
                const oldRegulars = parsedOld.filter(c => !c.isCaption);
                const oldCaption = parsedOld.find(c => c.isCaption);

                let oldIdx = 0;
                for(let i=1; i<=currentCarouselCount; i++) {
                    const elTxt = document.getElementById(`car-content-${i}`);
                    const txt = elTxt ? elTxt.value.trim() : "";
                    const img = currentCarouselImages[i] || null;
                    carouselData.push({ id: oldRegulars[oldIdx]?.id || (Date.now() + i + Math.random()), content: txt, image: img, isCaption: false });
                    if (!rawTextForTitle && txt) rawTextForTitle = txt; 
                    oldIdx++;
                }
                const capTxt = document.getElementById('car-content-caption') ? document.getElementById('car-content-caption').value.trim() : "";
                const capImg = currentCarouselImages['caption'] || null;
                carouselData.push({ id: oldCaption?.id || (Date.now() + 999 + Math.random()), content: capTxt, image: capImg, isCaption: true });
                if (!rawTextForTitle && capTxt) rawTextForTitle = capTxt;
                content = JSON.stringify(carouselData);
            } else if (category === 'mypassword') {
                const data = {
                    username: document.getElementById('pw-username').value.trim(),
                    password: document.getElementById('pw-password').value.trim(),
                    link: document.getElementById('pw-link').value.trim()
                };
                content = JSON.stringify(data);
                rawTextForTitle = data.username || data.link || "My Password";
            } else if (category === 'mypurchase') {
                const data = {
                    name: document.getElementById('pur-name').value.trim(),
                    owner: document.getElementById('pur-owner').value.trim(),
                    price: document.getElementById('pur-price').value.trim(),
                    link: document.getElementById('pur-link').value.trim(),
                    notes: document.getElementById('pur-notes').value.trim()
                };
                content = JSON.stringify(data);
                rawTextForTitle = data.name || data.owner || "My Purchase";
            } else if (category === 'myinstruction') {
                const data = {
                    link: document.getElementById('inst-link').value.trim(),
                    content: document.getElementById('inst-content').value.trim()
                };
                content = JSON.stringify(data);
                rawTextForTitle = data.content || data.link || "Instruction";
            } else if (category === 'revisi') {
                const data = {
                    tujuan: document.getElementById('rev-tujuan').value.trim(),
                    content: document.getElementById('rev-content').value.trim()
                };
                content = JSON.stringify(data);
                rawTextForTitle = data.tujuan || data.content || "Revisi";
            } else if (category === 'oneshot') {
                content = document.getElementById('oneshot-fs-hidden').value + document.getElementById('oneshot-fs-visible').innerText;
                rawTextForTitle = content;
            } else {
                content = document.getElementById('note-content').value.trim();
                rawTextForTitle = content;
            }

            let title = titleInput;
            if (!title) {
                if (rawTextForTitle) {
                    let cleanText = rawTextForTitle.replace(/^- \[[xX ]\]\s*/i, '');
                    const words = cleanText.trim().split(/\s+/);
                    title = words.slice(0, 4).join(' '); 
                    if (words.length > 4) title += '...';
                } else {
                    title = "Tanpa Judul";
                }
            }

            const attachmentsToSave = [...currentAttachments];

            if (id) {
                const index = window.notes.findIndex(n => String(n.id) === String(id));
                if(index > -1) {
                    window.notes[index] = { ...window.notes[index], category, title, content, attachments: attachmentsToSave, updatedAt: Date.now() };
                    if (window.isCloudReady) window.syncNoteToCloud(window.notes[index]);
                }
            } else {
                const newNote = { id: Date.now().toString(), category, title, content, attachments: attachmentsToSave, timestamp: Date.now() };
                window.notes.push(newNote);
                if (window.isCloudReady) window.syncNoteToCloud(newNote);
            }

            window.saveToStorage(false);
            window.showToast("Catatan tersimpan!");
            window.closeModal();
            window.renderNotes();
        }

        window.handleFileUpload = function(event, type) {
            const files = event.target.files;
            if (!files) return;
            Array.from(files).forEach(file => {
                if (type === 'image') {
                    window.processImageFile(file, (dataUrl, fileName, mimeType) => {
                        currentAttachments.push({ id: Date.now() + Math.random(), type: 'image', name: fileName, data: dataUrl, mimeType: mimeType });
                        window.renderAttachmentPreview();
                    });
                } else {
                    if (file.size > 1024 * 1024 * 2) { 
                        window.showToast(`File ${file.name} terlalu besar (Maks 2MB).`); return;
                    }
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        currentAttachments.push({ id: Date.now() + Math.random(), type: 'file', name: file.name, data: e.target.result, mimeType: file.type });
                        window.renderAttachmentPreview();
                    };
                    reader.readAsDataURL(file);
                }
            });
            event.target.value = ''; 
        }

        window.changeCarouselCount = function(delta) {
            const newCount = currentCarouselCount + delta;
            if (newCount < 1 || newCount > 20) {
                if (newCount > 20) window.showToast("Maksimal 20 kartu."); return;
            }
            const wrapper = document.getElementById('carousel-cards-wrapper');
            const captionEl = document.getElementById('car-input-group-caption');
            if (delta > 0) {
                currentCarouselCount++;
                wrapper.insertBefore(window.createCarouselInputGroup(currentCarouselCount, currentCarouselCount), captionEl);
            } else {
                const lastChild = document.getElementById(`car-input-group-${currentCarouselCount}`);

                window.renderModalCarouselImagePreview(index);

            const file = event.target.files[0];
            if (!file) return;
            window.processImageFile(file, (dataUrl) => {
                window.saveStateToHistory();
                const note = window.notes.find(n => String(n.id) === String(activeCarouselEdit.noteId));
                if (note) {
                    try {
                        let items = JSON.parse(note.content);
                        let card = items.find(i => String(i.id) === String(activeCarouselEdit.cardId));
                        if (card) {
                            card.image = dataUrl;
                            note.content = JSON.stringify(items);
                            note.updatedAt = Date.now();
                            window.saveToStorage(false);
                            if (window.isCloudReady) window.syncNoteToCloud(note);
                            window.renderNotes();
                            window.showToast("Gambar ditambahkan!");
                        }
                    } catch(err) {}
                }
            });
            event.target.value = '';

        window.executeCopy = function(withTitle) {
            if (noteIdToCopy === null) return;
            const note = window.notes.find(n => String(n.id) === String(noteIdToCopy));
            if (!note) { window.closeCopyOptions(); return; }
            
            let textToCopy = "";
            if (withTitle && note.title) textToCopy += `${note.title}\n\n`;
            
            if (note.category === 'carousel') {
                try {
                    let items = JSON.parse(note.content); let numIdx = 1;
                    textToCopy += items.map((it) => {
                        const title = it.isCaption ? 'Caption' : `Kartu ${numIdx++}`;
                        return `[${title}]\n${it.content}`;
                    }).join('\n\n---\n\n');
                } catch(e) {}
            } else if (note.category === 'mypassword') {
                try { let pw = JSON.parse(note.content); textToCopy += `Username: ${pw.username}\nPassword: ${pw.password}\nLink: ${pw.link}`; } catch(e) {}
            } else if (note.category === 'mypurchase') {
                try { let p = JSON.parse(note.content); textToCopy += `Produk: ${p.name}\nOwner: ${p.owner}\nHarga: ${p.price}\nLink: ${p.link}\nNotes: ${p.notes}`; } catch(e) {}
            } else if (note.category === 'myinstruction') {
                try { let i = JSON.parse(note.content); textToCopy += `Link: ${i.link}\n\nInstruksi:\n${i.content}`; } catch(e) {}
            } else if (note.category === 'revisi') {
                try { let rev = JSON.parse(note.content); textToCopy += `Tujuan Revisi: ${rev.tujuan}\n\nTeks:\n${rev.content}`; } catch(e) {}
            } else {
                textToCopy += note.content;
            }
            
            const textarea = document.createElement('textarea');
            textarea.value = textToCopy.trim();
            document.body.appendChild(textarea);
            textarea.select();
            try { document.execCommand('copy'); window.showToast("Teks disalin!"); } catch (err) {}
            document.body.removeChild(textarea);
            window.closeCopyOptions();
        }

        window.visitLink = function(id) {
            const note = window.notes.find(n => String(n.id) === String(id));
            if (!note) return;
            let urlToOpen = null;

            if (note.category === 'mypassword') {
                try { const pw = JSON.parse(note.content); if (pw.link) urlToOpen = pw.link; } catch(e) {}
            } else if (note.category === 'mypurchase') {
                try { const p = JSON.parse(note.content); if (p.link) urlToOpen = p.link; } catch(e) {}
            } else if (note.category === 'myinstruction') {
                try { const i = JSON.parse(note.content); if (i.link) urlToOpen = i.link; } catch(e) {}
            } else {
                const urlRegex = /(https?:\/\/[^\s]+)/;
                const match = note.content.match(urlRegex);
                if (match) urlToOpen = match[0];
            }

            if (urlToOpen) {
                if (!urlToOpen.match(/^https?:\/\//i)) urlToOpen = 'https://' + urlToOpen;
                window.open(urlToOpen, '_blank');
                window.showToast("Membuka tautan...");
            } else {
                window.showToast("Tidak ditemukan link pada catatan ini.");
            }
        }

        window.toggleMemoCheckbox = function(noteId, lineIndex, isChecked) {
            window.saveStateToHistory();
            const note = window.notes.find(n => String(n.id) === String(noteId));
            if (!note) return;
            let lines = note.content.split('\n');
            let match = lines[lineIndex].match(/^-\s+\[([xX ])\](.*)/);
            if (match) {
                lines[lineIndex] = `- [${isChecked ? 'x' : ' '}]${match[2]}`;
                note.content = lines.join('\n');
                window.saveToStorage(false);
                if (window.isCloudReady) window.syncNoteToCloud(note);
                window.renderNotes();
            }
        }

        window.escapeHTML = function(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag] || tag));
        }

        window.formatTextWithLinks = function(text, noteId, isMemo = false) {
            if (!text) return "";
            if (isMemo) {
                return text.split('\n').map((line, idx) => {
                    const cbMatch = line.match(/^-\s+\[([xX ])\]/);
                    if (cbMatch) {
                        const isChecked = cbMatch[1].toLowerCase() === 'x';
                        const cleanText = line.replace(/^-\s+\[[xX ]\]\s*/, '');
                        const linkedText = cleanText.replace(/(https?:\/\/[^\s]+)/g, url => `<a href="${url}" target="_blank" onclick="event.stopPropagation()" class="text-[#007AFF] hover:underline break-all">${url}</a>`);
                        return `<label class="flex items-start space-x-2.5 my-1.5 cursor-pointer" onclick="event.stopPropagation()">
                                    <input type="checkbox" ${isChecked ? 'checked' : ''} onchange="window.toggleMemoCheckbox('${noteId}', ${idx}, this.checked)" class="mt-1 w-4 h-4 rounded text-[#007AFF] focus:ring-[#007AFF]">
                                    <span class="${isChecked ? 'line-through text-gray-400 dark:text-gray-500' : 'text-black dark:text-white'} leading-snug">${linkedText}</span>
                                </label>`;
                    }
                    const linkedLine = window.escapeHTML(line).replace(/(https?:\/\/[^\s]+)/g, url => `<a href="${url}" target="_blank" onclick="event.stopPropagation()" class="text-[#007AFF] hover:underline break-all">${url}</a>`);
                    return `<div class="my-0.5">${linkedLine}</div>`;
                }).join('');
            }
            
            const safeText = window.escapeHTML(text);
            return safeText.replace(/(https?:\/\/[^\s]+)/g, url => `<a href="${url}" target="_blank" onclick="event.stopPropagation()" class="text-[#007AFF] hover:underline break-all">${url}</a>`);
        }

        window.formatTime = function(timestamp) {
            if (!timestamp) return '';
            return new Date(timestamp).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }).replace(/\./g, ':');
        }

                                <i class="fa-solid fa-ellipsis text-[20px]"></i>
                            </button>
                            
                            <!-- Context Menu POPUP -->
                            <div id="action-menu-${note.id}" class="action-menu-popup hidden absolute right-8 top-8 w-48 bg-white/85 dark:bg-[#252525]/85 backdrop-blur-2xl border border-black/5 dark:border-white/10 rounded-[14px] shadow-[0_8px_30px_rgb(0,0,0,0.12)] flex-col z-[60] overflow-hidden text-[15px] transform origin-top-right transition-all">
                                ${visitBtnVisible ? `
                                <button onclick="window.visitLink('${note.id}'); window.closeAllActionMenus(); event.stopPropagation();" class="w-full px-4 py-2.5 flex justify-between items-center text-black dark:text-white hover:bg-black/5 dark:hover:bg-white/10 transition-colors border-b border-black/5 dark:border-white/10">
                                    <span>Buka Link</span><i class="fa-solid fa-arrow-up-right-from-square text-[14px] opacity-50"></i>
                                </button>` : ''}
                                <button onclick="window.openCopyOptions('${note.id}'); window.closeAllActionMenus(); event.stopPropagation();" class="w-full px-4 py-2.5 flex justify-between items-center text-black dark:text-white hover:bg-black/5 dark:hover:bg-white/10 transition-colors border-b border-black/5 dark:border-white/10">
                                    <span>Salin Teks</span><i class="fa-regular fa-copy text-[14px] opacity-50"></i>
                                </button>
                                <button onclick="window.openModal('${note.id}'); window.closeAllActionMenus(); event.stopPropagation();" class="w-full px-4 py-2.5 flex justify-between items-center text-black dark:text-white hover:bg-black/5 dark:hover:bg-white/10 transition-colors border-b border-black/5 dark:border-white/10">
                                    <span>Edit Catatan</span><i class="fa-solid fa-pen text-[14px] opacity-50"></i>
                                </button>
                                <button onclick="window.openDeleteAlert('${note.id}'); window.closeAllActionMenus(); event.stopPropagation();" class="w-full px-4 py-2.5 flex justify-between items-center text-[#FF3B30] hover:bg-[#FF3B30]/10 transition-colors">
                                    <span>Hapus</span><i class="fa-solid fa-trash text-[14px]"></i>
                                </button>
                            </div>
                            
                            <i class="fa-solid fa-chevron-down text-gray-400 text-sm chevron-icon pl-2 ml-1 ${openClass}" id="note-icon-${note.id}"></i>
                        </div>
                    </div>
                    
                    <div class="accordion-content border-t border-transparent ${openClass}" id="note-body-${note.id}">
                        <div class="accordion-inner">
                            <div class="p-5 pt-1">
                                ${imagesHtml}
                                ${previewContent}
                                ${filesHtml}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        window.renderNotes = function() {
            const container = document.getElementById('notes-container');
            container.innerHTML = '';
            if (window.notes.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center text-gray-400 pt-32">
                        <i class="fa-solid fa-cloud text-7xl mb-4 text-gray-300 dark:text-gray-700"></i>
                        <p class="font-semibold text-xl text-black dark:text-white tracking-tight">i-cloud Kosong</p>
                        <p class="text-[15px] mt-1">Ketuk ikon pensil untuk memulai.</p>
                    </div>`;
                return;
            }

            let html = '';
            if (isGrouped) {
                html += `<div class="columns-1 lg:columns-2 xl:columns-3 gap-5 md:gap-6">`;
                Object.keys(categories).forEach(catKey => {
                    const catNotes = window.notes.filter(n => n.category === catKey).sort((a,b) => b.timestamp - a.timestamp);
                    if (catNotes.length > 0) {
                        const config = categories[catKey];
                        const isCatOpen = openCategories.has(catKey);
                        const openClass = isCatOpen ? "open" : "";
                        html += `
                            <div class="mb-5 md:mb-6 break-inside-avoid inline-block w-full bg-white dark:bg-[#1C1C1E] border border-black/5 dark:border-white/10 rounded-[24px] shadow-sm overflow-hidden transition-colors">
                                <div class="flex justify-between items-center px-5 py-4 cursor-pointer hover:bg-gray-50 dark:hover:bg-white/5 transition-colors" onclick="window.toggleCategory('${catKey}')">
                                    <div class="flex items-center">
                                        <div class="w-9 h-9 rounded-[10px] ${config.bg} ${config.color} flex items-center justify-center mr-3 text-lg">${config.icon}</div>
                                        <h2 class="text-[17px] font-semibold text-black dark:text-white tracking-tight">${config.title}</h2>
                                        <span class="ml-3 bg-gray-100 dark:bg-[#2C2C2E] text-gray-500 px-2.5 py-0.5 rounded-full text-xs font-bold">${catNotes.length}</span>
                                    </div>
                                    <i class="fa-solid fa-chevron-down text-gray-400 text-sm chevron-icon ${openClass}" id="cat-icon-${catKey}"></i>
                                </div>
                                <div class="accordion-content ${openClass}" id="cat-body-${catKey}">
                                    <div class="accordion-inner bg-gray-50/50 dark:bg-black/20 border-t border-black/5 dark:border-white/10">
                                        <div class="p-4 pb-0">`;
                        catNotes.forEach(note => { html += window.buildNoteCard(note, false); });
                        html += `       </div>
                                    </div>
                                </div>
                            </div>`;
                    }
                });
                html += `</div>`;
            } else {
                const allNotes = [...window.notes].sort((a,b) => b.timestamp - a.timestamp);
                html += `<div class="columns-1 sm:columns-2 lg:columns-3 xl:columns-4 gap-4 md:gap-5 lg:gap-6 pt-2">`;
                allNotes.forEach(note => { html += window.buildNoteCard(note, false); });
                html += `</div>`;
            }
            container.innerHTML = html;
        }

        window.deleteCarouselCard = function(noteId, cardId) {
            if (!confirm("Hapus kartu ini dari Carousel?")) return;
            window.saveStateToHistory();
            const note = window.notes.find(n => String(n.id) === String(noteId));
            if (!note) return;
            try {
                let items = JSON.parse(note.content);
                items = items.filter(i => String(i.id) !== String(cardId));
                note.content = JSON.stringify(items);
                note.updatedAt = Date.now();
                window.saveToStorage(false);
                if (window.isCloudReady) window.syncNoteToCloud(note);
                window.renderNotes();
                window.showToast("Kartu carousel dihapus.");
            } catch(e) {}
        }
        
        window.copyCarouselCard = function(noteId, cardId) {
            const note = window.notes.find(n => String(n.id) === String(noteId));
            if (!note) return;
            try {
                const items = JSON.parse(note.content);
                const card = items.find(i => String(i.id) === String(cardId));
                if (card) {
                    const textarea = document.createElement('textarea');
                    textarea.value = card.content;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    window.showToast("Teks kartu disalin!");
                }
            } catch(e) {}
        }

        window.saveEditCarouselCard = function() {
            const note = window.notes.find(n => String(n.id) === String(activeCarouselEdit.noteId));
            if (!note) return;
            try {
                let items = JSON.parse(note.content);
                let card = items.find(i => String(i.id) === String(activeCarouselEdit.cardId));
                if (card) {
                    card.content = document.getElementById('edit-card-textarea').value;
                    note.content = JSON.stringify(items);
                    note.updatedAt = Date.now();
                    window.saveToStorage(false);
                    if (window.isCloudReady) window.syncNoteToCloud(note);
                    window.renderNotes();
                    window.closeEditCarouselCardModal();
                    window.showToast("Kartu berhasil diperbarui!");
                }
            } catch(e) {}
        }

        window.openOneShotFullscreen = function() {
            const overlay = document.getElementById('oneshot-fullscreen-overlay');
            overlay.classList.remove('hidden'); overlay.classList.add('flex');
            setTimeout(() => { overlay.classList.remove('opacity-0'); window.placeCaretAtEnd(document.getElementById('oneshot-fs-visible')); }, 10);
        }
        window.closeOneShotFullscreen = function() {
            const overlay = document.getElementById('oneshot-fullscreen-overlay');
            overlay.classList.add('opacity-0');
            setTimeout(() => { overlay.classList.add('hidden'); overlay.classList.remove('flex'); }, 300);
        }
        window.handleOneShotInput = function(e) {
            const visibleEl = document.getElementById('oneshot-fs-visible');
            const hiddenEl = document.getElementById('oneshot-fs-hidden');
            let val = visibleEl.innerText.replace(/\u00A0/g, " "); 
            if (val.length === 1 && val.match(/[a-z]/)) {
                const hiddenVal = hiddenEl.value;
                if (hiddenVal === "" || /(?:[.!?])[\s\n]*$/.test(hiddenVal)) {
                    val = val.toUpperCase(); visibleEl.innerText = val; window.placeCaretAtEnd(visibleEl);
                }
            }
            if (val.includes(' ') || val.includes('\n')) {
                const match = val.match(/^(.*[\s\n]+)([^\s\n]*)$/);
                if (match) { hiddenEl.value += match[1]; visibleEl.innerText = match[2]; window.placeCaretAtEnd(visibleEl); }
            }
            window.updateOneShotStats();
            const box = document.getElementById('oneshot-fs-preview-box');
            if (!box.classList.contains('hidden')) box.innerText = hiddenEl.value + visibleEl.innerText;
        }
        window.placeCaretAtEnd = function(el) {
            el.focus();
            if (typeof window.getSelection !== "undefined" && typeof document.createRange !== "undefined") {
                const range = document.createRange(); range.selectNodeContents(el); range.collapse(false);
                const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
            }
        }
        window.updateOneShotStats = function() {
            const hiddenVal = document.getElementById('oneshot-fs-hidden')?.value || "";
            const visibleVal = document.getElementById('oneshot-fs-visible')?.innerText || "";
            const text = (hiddenVal + visibleVal).trim();
            const wordCount = text ? text.split(/\s+/).length : 0;
            const statEl = document.getElementById('oneshot-fs-stats');
            if(statEl) statEl.innerText = `${wordCount} Kata`;
        }
        window.toggleOneShotPreview = function() {
            const box = document.getElementById('oneshot-fs-preview-box');
            const hidden = document.getElementById('oneshot-fs-hidden');
            const visible = document.getElementById('oneshot-fs-visible');
            const btnText = document.getElementById('oneshot-preview-btn-text');
            const btnIcon = document.querySelector('#btn-oneshot-preview i');
            if (box.classList.contains('hidden')) {
                box.innerText = hidden.value + visible.innerText;
                box.classList.remove('hidden'); btnText.innerText = "Tutup Intip"; btnIcon.className = "fa-solid fa-eye-slash mr-2";
            } else {
                box.classList.add('hidden'); btnText.innerText = "Intip Teks"; btnIcon.className = "fa-solid fa-eye mr-2"; window.placeCaretAtEnd(visible);
            }
        }
    </script>

    <!-- FIREBASE CLOUD STORAGE MODULE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, deleteDoc, onSnapshot, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const initCloud = async () => {
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'icloud-notes';
            const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
            const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

            if (!firebaseConfig) {
                console.warn("Modul Cloud tidak menerima Konfigurasi. Tetap di Local Storage.");
                return;
            }

            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);

            try {
                const userCredential = initialAuthToken 
                    ? await signInWithCustomToken(auth, initialAuthToken) 
                    : await signInAnonymously(auth);
                
                const userId = userCredential.user.uid;
                window.isCloudReady = true;
                
                // Ubah Indikator Awan menjadi Biru karena terhubung ke Cloud
                const cloudIcon = document.getElementById('header-cloud-icon');
                if(cloudIcon) {
                    cloudIcon.classList.remove('text-gray-400');
                    cloudIcon.classList.add('text-[#007AFF]');
                    cloudIcon.title = "Terhubung ke Cloud";
                }

                // Listener Real-time
                const notesRef = collection(db, 'artifacts', appId, 'users', userId, 'notes');
                onSnapshot(notesRef, (snapshot) => {
                    const fetchedNotes = [];
                    snapshot.forEach(doc => fetchedNotes.push(doc.data()));
                    // Timpa data lokal dengan data dari awan, urutkan berdasarkan waktu
                    window.notes = fetchedNotes.sort((a, b) => b.timestamp - a.timestamp);
                    window.renderNotes();
                    window.updateUndoRedoButtons();
                }, (err) => {
                    console.error("Cloud Listener Error:", err);
                    window.showToast("Koneksi ke Cloud Terputus.");
                });

                // Menimpa fungsi dummy dengan kemampuan injeksi Cloud
                window.syncNoteToCloud = async function(note) {
                    try { await setDoc(doc(db, 'artifacts', appId, 'users', userId, 'notes', String(note.id)), note); } 
                    catch(e) { console.error("Cloud Sync Error:", e); }
                };

                window.deleteNoteFromCloud = async function(noteId) {
                    try { await deleteDoc(doc(db, 'artifacts', appId, 'users', userId, 'notes', String(noteId))); } 
                    catch(e) { console.error("Cloud Delete Error:", e); }
                };

                window.syncAllToCloud = async function(restoredNotes) {
                    try {
                        const snap = await getDocs(collection(db, 'artifacts', appId, 'users', userId, 'notes'));
                        const currentIds = snap.docs.map(d => d.id);
                        const restoredIds = restoredNotes.map(n => String(n.id));

                        for (const id of currentIds) {
                            if (!restoredIds.includes(id)) {
                                await deleteDoc(doc(db, 'artifacts', appId, 'users', userId, 'notes', id));
                            }
                        }
                        for (const note of restoredNotes) {
                            await setDoc(doc(db, 'artifacts', appId, 'users', userId, 'notes', String(note.id)), note);
                        }
                    } catch(e) { console.error("Cloud SyncAll Error:", e); }
                };

            } catch (error) {
                console.error("Gagal Autentikasi ke Cloud:", error);
                window.showToast("Menggunakan Penyimpanan Lokal Sementara");
            }
        };

        // Tunggu 100ms agar kode utama termuat dahulu, baru timpa fungsinya
        setTimeout(() => initCloud(), 100);
    </script>
