<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>i-cloud</title>
    
    <!-- Google Fonts: Inter (Standar iOS) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        ::-webkit-scrollbar { width: 0px; height: 0px; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .modal-enter { transform: translateY(100%); opacity: 0; transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.3s; }
        .modal-active { transform: translateY(0); opacity: 1; }
        
        /* Glassmorphism murni gaya iOS */
        .glass-header {
            background-color: rgba(242, 242, 247, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid rgba(0,0,0,0.1);
        }

        .dark .glass-header {
            background-color: rgba(28, 28, 30, 0.75);
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
        }

        .accordion-content {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .accordion-content.open { grid-template-rows: 1fr; }
        .accordion-inner { overflow: hidden; }

        .chevron-icon { transition: transform 0.3s ease; }
        .chevron-icon.open { transform: rotate(180deg); }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden bg-[#F2F2F7] dark:bg-[#000000] transition-colors duration-300">

    <header class="glass-header fixed top-0 w-full z-20 h-16 flex items-center justify-between px-4 md:px-6 lg:px-8">
        <div class="flex items-center space-x-2 text-gray-900 dark:text-white">
            <i id="cloud-icon" class="fa-solid fa-cloud text-xl text-gray-400 transition-colors duration-500"></i>
            <h1 class="text-[18px] font-bold tracking-tight">i-cloud</h1>
        </div>
        
        <div class="flex items-center space-x-3">
            <button onclick="window.performUndo()" id="btn-undo" class="flex flex-col items-center justify-center text-gray-500 dark:text-gray-400 active:opacity-50 w-10 transition-opacity" style="opacity: 0.4; pointer-events: none;" title="Undo">
                <i class="fa-solid fa-rotate-left text-[16px]"></i>
                <span class="text-[9px] font-bold mt-0.5">UNDO</span>
            </button>
            <button onclick="window.performRedo()" id="btn-redo" class="flex flex-col items-center justify-center text-gray-500 dark:text-gray-400 active:opacity-50 w-10 transition-opacity" style="opacity: 0.4; pointer-events: none;" title="Redo">
                <i class="fa-solid fa-rotate-right text-[16px]"></i>
                <span class="text-[9px] font-bold mt-0.5">REDO</span>
            </button>
            
            <div class="w-px h-5 bg-gray-300 dark:bg-gray-700 mx-1"></div>
            
            <button onclick="window.toggleTheme()" id="btn-theme" class="w-8 h-8 flex items-center justify-center text-yellow-500 active:opacity-50 text-[18px]" title="Ubah Tema">
                <i class="fa-solid fa-sun" id="theme-icon"></i>
            </button>

            <button onclick="window.toggleGroupView()" id="btn-group" class="w-8 h-8 flex items-center justify-center text-indigo-500 active:opacity-50 text-[18px]" title="Kategorikan">
                <i class="fa-solid fa-layer-group"></i>
            </button>
            <button onclick="window.openModal()" class="w-8 h-8 flex items-center justify-center text-blue-500 active:opacity-50 text-[24px]" title="Tambah Catatan">
                <i class="fa-solid fa-circle-plus"></i>
            </button>
        </div>
    </header>

    <!-- pt-28 (112px) dan mt-4 (16px) ditambahkan agar judul kartu pertama tidak terpotong header -->
    <main class="flex-1 overflow-y-auto hide-scrollbar pt-28 pb-12 px-4 lg:px-8" id="main-area">
        <div id="notes-container" class="w-full max-w-[1600px] mx-auto mt-4">
            <!-- Catatan akan di-render di sini via JavaScript -->
        </div>
    </main>

    <!-- iOS SYSTEM ACTION SHEET: Context Menu Khusus Catatan -->
    <div id="action-sheet-overlay" class="fixed inset-0 bg-black/40 dark:bg-black/60 backdrop-blur-sm z-50 hidden opacity-0 transition-opacity duration-300" onclick="window.closeActionSheet()"></div>
    <div id="action-sheet" class="fixed inset-x-4 bottom-6 md:max-w-sm md:mx-auto z-50 hidden flex-col gap-2 transition-transform duration-300 translate-y-[200%]">
        <div class="bg-[#F2F2F7]/95 dark:bg-[#1C1C1E]/95 backdrop-blur-xl rounded-2xl overflow-hidden flex flex-col shadow-2xl">
            <button id="as-btn-visit" onclick="window.actionVisit()" class="hidden px-5 py-4 text-[17px] font-medium text-gray-900 dark:text-white border-b border-gray-300/50 dark:border-gray-600/50 hover:bg-black/5 dark:hover:bg-white/5 active:bg-black/10 transition-colors">Kunjungi Tautan</button>
            <button onclick="window.actionCopy()" class="px-5 py-4 text-[17px] font-medium text-gray-900 dark:text-white border-b border-gray-300/50 dark:border-gray-600/50 hover:bg-black/5 dark:hover:bg-white/5 active:bg-black/10 transition-colors">Salin Catatan</button>
            <button onclick="window.actionEdit()" class="px-5 py-4 text-[17px] font-medium text-gray-900 dark:text-white border-b border-gray-300/50 dark:border-gray-600/50 hover:bg-black/5 dark:hover:bg-white/5 active:bg-black/10 transition-colors">Edit Catatan</button>
            <button onclick="window.actionDelete()" class="px-5 py-4 text-[17px] font-semibold text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 active:bg-black/10 transition-colors">Hapus Catatan</button>
        </div>
        <button onclick="window.closeActionSheet()" class="bg-[#F2F2F7] dark:bg-[#1C1C1E] rounded-2xl px-5 py-4 text-[17px] font-bold text-blue-500 hover:bg-black/5 dark:hover:bg-white/5 active:bg-black/10 shadow-2xl transition-colors">Batal</button>
    </div>

    <!-- MODAL UTAMA TAMBAH/EDIT CATATAN -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/40 dark:bg-black/60 backdrop-blur-sm z-30 hidden opacity-0 transition-opacity duration-300" onclick="window.closeModal()"></div>
    <div id="modal" class="fixed inset-x-0 bottom-0 z-40 bg-white dark:bg-[#1C1C1E] rounded-t-3xl h-[85vh] md:max-w-2xl md:mx-auto shadow-2xl modal-enter flex flex-col transition-colors">
        <div class="flex justify-between items-center px-5 py-4 border-b border-gray-200 dark:border-gray-800 bg-gray-50/50 dark:bg-[#1C1C1E] rounded-t-3xl shrink-0">
            <button onclick="window.closeModal()" class="text-blue-500 font-medium text-[17px]">Batal</button>
            <h2 class="font-semibold text-[17px] text-gray-900 dark:text-white" id="modal-title">Buat Catatan</h2>
            <button onclick="window.saveNote()" class="text-blue-500 font-bold text-[17px]">Simpan</button>
        </div>
        
        <div class="p-5 flex-1 overflow-y-auto hide-scrollbar bg-white dark:bg-[#1C1C1E]">
            <input type="hidden" id="note-id">
            
            <div class="mb-4">
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Kategori</label>
                <div class="relative">
                    <select id="note-category" onchange="window.toggleInputFields()" class="w-full appearance-none bg-[#F2F2F7] dark:bg-[#2C2C2E] border-none text-gray-900 dark:text-white py-3 px-4 rounded-xl font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors">
                        <option value="brandkit">💼 Brand Kit</option>
                        <option value="carousel">🗂️ Carousel Notes</option>
                        <option value="copas" selected>📋 Copas</option>
                        <option value="efekfont">🔤 Efek Font</option>
                        <option value="error">🐛 Error Book</option>
                        <option value="gemsgpt">💎 GEMS/GPT</option>
                        <option value="ideation">💡 Ideation</option>
                        <option value="jenisfont">🔠 Jenis Font</option>
                        <option value="jurnal">📓 Jurnal</option>
                        <option value="laporan">📊 Laporan</option>
                        <option value="myinstruction">💻 Instruction</option>
                        <option value="memo">📝 Memo Tasks</option>
                        <option value="mylink">🔗 My Link</option>
                        <option value="mypassword">🔑 My Password</option>
                        <option value="myprompt">⌨️ My Prompt</option>
                        <option value="mypurchase">🛍️ My Purchase</option>
                        <option value="oneshot">🎯 One Shot</option>
                        <option value="revisi">🔄 Revisi</option>
                        <option value="screenshot">📸 Screenshot</option>
                        <option value="styleart">🎨 Style Art</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-400">
                        <i class="fa-solid fa-chevron-down text-sm"></i>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <input type="text" id="note-title" placeholder="Judul Catatan..." class="w-full text-[22px] font-bold focus:outline-none text-black dark:text-white bg-transparent placeholder-gray-400 dark:placeholder-gray-500 py-2 border-b border-gray-200 dark:border-gray-800">
            </div>

            <div class="mb-4">
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Lampiran (Otomatis Kompres)</label>
                <div class="flex space-x-2 mb-3">
                    <button onclick="document.getElementById('attach-image').click()" class="bg-[#F2F2F7] dark:bg-[#2C2C2E] hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-900 dark:text-white px-4 py-2.5 rounded-xl text-[14px] font-medium transition flex items-center shadow-sm"><i class="fa-solid fa-image text-blue-500 mr-2"></i> Gambar</button>
                    <button onclick="document.getElementById('attach-file').click()" class="bg-[#F2F2F7] dark:bg-[#2C2C2E] hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-900 dark:text-white px-4 py-2.5 rounded-xl text-[14px] font-medium transition flex items-center shadow-sm"><i class="fa-solid fa-paperclip text-purple-500 mr-2"></i> File</button>
                    <input type="file" id="attach-image" accept="image/*" class="hidden" onchange="window.handleFileUpload(event, 'image')" multiple>
                    <input type="file" id="attach-file" accept=".txt,.pdf,.html,.json,.doc,.docx,.xls,.xlsx,.csv" class="hidden" onchange="window.handleFileUpload(event, 'file')" multiple>
                </div>
                <div id="attachment-preview" class="flex flex-wrap gap-2"></div>
            </div>
            
            <!-- Mode Teks Biasa -->
            <div id="normal-input-container" class="w-full flex-col flex h-56">
                <textarea id="note-content" placeholder="Ketik isi catatan di sini..." class="w-full h-full text-[16px] focus:outline-none text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-500 resize-none leading-relaxed bg-[#F2F2F7] dark:bg-[#2C2C2E] p-4 rounded-2xl border-none"></textarea>
            </div>

            <!-- Mode Carousel -->
            <div id="carousel-input-container" class="w-full flex-col hidden pb-5">
                <div class="flex justify-between items-center mb-3">
                    <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Isi Kartu Carousel</label>
                    <div class="flex items-center space-x-2 bg-[#F2F2F7] dark:bg-[#2C2C2E] rounded-lg p-1">
                        <button onclick="window.changeCarouselCount(-1)" class="w-7 h-7 flex items-center justify-center text-gray-900 dark:text-white hover:bg-gray-200 dark:hover:bg-gray-600 rounded active:scale-95 transition-all"><i class="fa-solid fa-minus text-xs"></i></button>
                        <span id="carousel-count-display" class="text-sm font-bold text-gray-900 dark:text-white w-6 text-center">3</span>
                        <button onclick="window.changeCarouselCount(1)" class="w-7 h-7 flex items-center justify-center text-gray-900 dark:text-white hover:bg-gray-200 dark:hover:bg-gray-600 rounded active:scale-95 transition-all"><i class="fa-solid fa-plus text-xs"></i></button>
                    </div>
                </div>
                <div id="carousel-cards-wrapper" class="space-y-4"></div>
            </div>
            
            <!-- Mode My Password -->
            <div id="mypassword-input-container" class="w-full flex-col hidden space-y-4 pb-5">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1.5">Username / Email</label>
                    <input type="text" id="pw-username" placeholder="Masukkan Username..." class="w-full bg-[#F2F2F7] dark:bg-[#2C2C2E] border-none p-3.5 rounded-xl text-[16px] text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1.5">Password</label>
                    <input type="text" id="pw-password" placeholder="Masukkan Password..." class="w-full bg-[#F2F2F7] dark:bg-[#2C2C2E] border-none p-3.5 rounded-xl text-[16px] text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1.5">Link / URL</label>
                    <input type="url" id="pw-link" placeholder="https://..." class="w-full bg-[#F2F2F7] dark:bg-[#2C2C2E] border-none p-3.5 rounded-xl text-[16px] text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <!-- Mode Revisi -->
            <div id="revisi-input-container" class="w-full flex-col hidden space-y-4 pb-5">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1.5">Tujuan Revisi</label>
                    <input type="text" id="rev-tujuan" placeholder="Misal: Perbaiki grammar..." class="w-full bg-[#F2F2F7] dark:bg-[#2C2C2E] border-none p-3.5 rounded-xl text-[16px] text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1.5">Teks Utama</label>
                    <textarea id="rev-content" placeholder="Ketik teks di sini..." class="w-full h-40 bg-[#F2F2F7] dark:bg-[#2C2C2E] border-none p-4 rounded-xl text-[16px] text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none leading-relaxed"></textarea>
                </div>
            </div>

            <!-- Mode Instruction -->
            <div id="instruction-input-container" class="w-full flex-col hidden space-y-4 pb-5">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1.5">Link / Referensi</label>
                    <input type="url" id="inst-link" placeholder="https://..." class="w-full bg-[#F2F2F7] dark:bg-[#2C2C2E] border-none p-3.5 rounded-xl text-[16px] text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1.5">Instruksi / Catatan</label>
                    <textarea id="inst-content" placeholder="Ketik instruksi di sini..." class="w-full h-40 bg-[#F2F2F7] dark:bg-[#2C2C2E] border-none p-4 rounded-xl text-[16px] text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none leading-relaxed"></textarea>
                </div>
            </div>

            <!-- Mode My Purchase -->
            <div id="mypurchase-input-container" class="w-full flex-col hidden space-y-4 pb-5">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1.5">Nama Produk</label>
                    <input type="text" id="pur-nama" placeholder="Misal: Template X..." class="w-full bg-[#F2F2F7] dark:bg-[#2C2C2E] border-none p-3.5 rounded-xl text-[16px] text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1.5">Owner</label>
                        <input type="text" id="pur-owner" placeholder="Nama Penjual..." class="w-full bg-[#F2F2F7] dark:bg-[#2C2C2E] border-none p-3.5 rounded-xl text-[16px] text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="flex-1">
                        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1.5">Harga Beli</label>
                        <input type="text" id="pur-harga" placeholder="Rp..." class="w-full bg-[#F2F2F7] dark:bg-[#2C2C2E] border-none p-3.5 rounded-xl text-[16px] text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1.5">Link Produk</label>
                    <input type="url" id="pur-link" placeholder="https://..." class="w-full bg-[#F2F2F7] dark:bg-[#2C2C2E] border-none p-3.5 rounded-xl text-[16px] text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1.5">Keterangan</label>
                    <textarea id="pur-keterangan" placeholder="Catatan tambahan..." class="w-full h-24 bg-[#F2F2F7] dark:bg-[#2C2C2E] border-none p-4 rounded-xl text-[16px] text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none leading-relaxed"></textarea>
                </div>
            </div>

            <!-- Mode One Shot -->
            <div id="oneshot-input-container" class="w-full flex-col hidden pb-5 items-center justify-center py-6">
                <div class="w-20 h-20 bg-rose-100 dark:bg-rose-900/30 text-rose-500 rounded-full flex items-center justify-center text-4xl mb-4">🎯</div>
                <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-2">Mode Anti-Distraksi</h3>
                <p class="text-center text-sm text-gray-500 dark:text-gray-400 mb-6 px-4">Teks otomatis hilang per kata saat spasi. Fokus aliran ide.</p>
                <button onclick="window.openOneShotFullscreen()" class="bg-blue-500 hover:bg-blue-600 text-white px-8 py-3.5 rounded-full font-bold transition-colors shadow-sm active:scale-95 w-full md:w-auto flex items-center justify-center">
                    <i class="fa-solid fa-expand mr-2"></i> Buka Kanvas One Shot
                </button>
            </div>
        </div>
    </div>

    <!-- IOS SYSTEM ALERT: DELETE -->
    <div id="delete-alert-overlay" class="fixed inset-0 bg-black/40 dark:bg-black/60 backdrop-blur-sm z-50 hidden opacity-0 transition-opacity duration-300 flex items-center justify-center p-4">
        <div id="delete-alert-box" class="bg-[#F2F2F7]/90 dark:bg-[#1C1C1E]/90 backdrop-blur-xl rounded-2xl w-full max-w-[270px] overflow-hidden shadow-2xl transform scale-95 transition-transform duration-300">
            <div class="p-5 text-center">
                <h3 class="text-[17px] font-semibold text-gray-900 dark:text-white mb-1">Hapus Catatan?</h3>
                <p class="text-[13px] text-gray-900 dark:text-gray-300">Catatan ini akan dihapus permanen dari iCloud.</p>
            </div>
            <div class="flex border-t border-gray-300/50 dark:border-gray-600/50">
                <button onclick="window.closeDeleteAlert()" class="flex-1 py-3 text-blue-500 font-normal text-[17px] hover:bg-black/5 dark:hover:bg-white/5 transition-colors border-r border-gray-300/50 dark:border-gray-600/50 active:bg-black/10">Batal</button>
                <button onclick="window.confirmDelete()" class="flex-1 py-3 text-red-500 font-semibold text-[17px] hover:bg-black/5 dark:hover:bg-white/5 transition-colors active:bg-black/10">Hapus</button>
            </div>
        </div>
    </div>

    <!-- IOS SYSTEM ALERT: COPY -->
    <div id="copy-options-overlay" class="fixed inset-0 bg-black/40 dark:bg-black/60 backdrop-blur-sm z-50 hidden opacity-0 transition-opacity duration-300 flex items-center justify-center p-4">
        <div id="copy-options-box" class="bg-[#F2F2F7]/90 dark:bg-[#1C1C1E]/90 backdrop-blur-xl rounded-2xl w-full max-w-[270px] overflow-hidden shadow-2xl transform scale-95 transition-transform duration-300">
            <div class="p-4 text-center border-b border-gray-300/50 dark:border-gray-600/50">
                <h3 class="text-[14px] text-gray-500 font-medium">Opsi Salin</h3>
            </div>
            <div class="flex flex-col">
                <button onclick="window.executeCopy(true)" class="py-3.5 text-blue-500 font-normal text-[17px] hover:bg-black/5 dark:hover:bg-white/5 transition-colors border-b border-gray-300/50 dark:border-gray-600/50 active:bg-black/10">Beserta Judul</button>
                <button onclick="window.executeCopy(false)" class="py-3.5 text-blue-500 font-normal text-[17px] hover:bg-black/5 dark:hover:bg-white/5 transition-colors border-b border-gray-300/50 dark:border-gray-600/50 active:bg-black/10">Hanya Isi Teks</button>
                <button onclick="window.closeCopyOptions()" class="py-3.5 text-gray-900 dark:text-white font-semibold text-[17px] hover:bg-black/5 dark:hover:bg-white/5 transition-colors active:bg-black/10">Batal</button>
            </div>
        </div>
    </div>

    <!-- TOAST NOTIFICATION -->
    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-900/90 dark:bg-white/90 backdrop-blur-md text-white dark:text-gray-900 px-5 py-3 rounded-full shadow-[0_8px_30px_rgb(0,0,0,0.12)] transition-all duration-300 translate-y-20 opacity-0 z-50 flex items-center pointer-events-none">
        <i class="fa-solid fa-check-circle text-green-400 dark:text-green-500 text-lg mr-3"></i>
        <span id="toast-message" class="text-[15px] font-medium">Notifikasi</span>
    </div>

    <!-- KANVAS ONE SHOT -->
    <div id="oneshot-fullscreen-overlay" class="fixed inset-0 bg-[#F2F2F7] dark:bg-[#000000] z-[100] hidden flex-col transition-opacity duration-300 opacity-0">
        <div class="absolute top-6 left-6 right-6 flex justify-between items-center z-30 pointer-events-none">
            <div id="oneshot-fs-stats" class="text-sm font-bold text-gray-500 bg-gray-200 dark:bg-gray-800 px-4 py-2 rounded-full pointer-events-auto">0 Kata</div>
            <button onclick="window.closeOneShotFullscreen()" class="w-10 h-10 bg-gray-200 dark:bg-gray-800 rounded-full flex items-center justify-center text-gray-900 dark:text-white active:scale-95 pointer-events-auto">
                <i class="fa-solid fa-check text-lg"></i>
            </button>
        </div>
        <textarea id="oneshot-fs-hidden" class="hidden"></textarea>
        <div class="flex-1 flex items-center justify-center p-8 relative overflow-hidden z-10">

        // Sistem Undo/Redo
        window.actionHistory = [];
        window.redoStack = [];

        window.pushHistory = function(actionType, oldState, newState) {
            window.actionHistory.push({ type: actionType, old: oldState, new: newState });
            window.redoStack = [];
            if (window.actionHistory.length > 30) window.actionHistory.shift();
            window.updateUndoRedoUI();
        };

        window.updateUndoRedoUI = function() {
            const btnUndo = document.getElementById('btn-undo');
            const btnRedo = document.getElementById('btn-redo');
            if(btnUndo) {
                btnUndo.style.opacity = window.actionHistory.length > 0 ? '1' : '0.4';
                btnUndo.style.pointerEvents = window.actionHistory.length > 0 ? 'auto' : 'none';
            }
            if(btnRedo) {
                btnRedo.style.opacity = window.redoStack.length > 0 ? '1' : '0.4';
                btnRedo.style.pointerEvents = window.redoStack.length > 0 ? 'auto' : 'none';
            }
        };

        window.performUndo = async function() {
            if (window.actionHistory.length === 0) return window.showToast("Tidak ada tindakan undo");
            const action = window.actionHistory.pop();
            window.redoStack.push(action);
            window.updateUndoRedoUI();
            window.showToast("Mengembalikan (Undo)...");
            try {
                if (action.old) await window.setDoc(window.doc(window.db, "notes", action.old.id.toString()), action.old);
                else if (action.new) await window.deleteDoc(window.doc(window.db, "notes", action.new.id.toString()));
            } catch(e) { window.showToast("Gagal Undo"); }
        };

        window.performRedo = async function() {
            if (window.redoStack.length === 0) return window.showToast("Tidak ada tindakan redo");
            const action = window.redoStack.pop();
            window.actionHistory.push(action);
            window.updateUndoRedoUI();
            window.showToast("Menerapkan ulang (Redo)...");
            try {
                if (action.new) await window.setDoc(window.doc(window.db, "notes", action.new.id.toString()), action.new);
                else if (action.old) await window.deleteDoc(window.doc(window.db, "notes", action.old.id.toString()));
            } catch(e) { window.showToast("Gagal Redo"); }
        };

        window.escapeHTML = function(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag] || tag));
        };

        window.formatTextWithLinks = function(text) {
            if (!text) return '';
            const safeText = window.escapeHTML(text);
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return safeText.replace(urlRegex, function(url) {
                return `<a href="${url}" target="_blank" onclick="event.stopPropagation()" class="text-blue-500 dark:text-blue-400 hover:underline break-all">${url}</a>`;
            });

        window.handleOneShotInput = function(e) {
            const visibleEl = document.getElementById('oneshot-fs-visible');
            const hiddenEl = document.getElementById('oneshot-fs-hidden');
            let val = visibleEl.innerText.replace(/\u00A0/g, " "); 
            if (val.length === 1 && val.match(/[a-z]/)) {
                const hiddenVal = hiddenEl.value;
                if (hiddenVal === "" || /(?:[.!?])[\s\n]*$/.test(hiddenVal)) {
                    val = val.toUpperCase(); visibleEl.innerText = val; window.placeCaretAtEnd(visibleEl);
                }
            }
            if (val.includes(' ') || val.includes('\n')) {
                const match = val.match(/^(.*[\s\n]+)([^\s\n]*)$/);
                if (match) {
                    hiddenEl.value += match[1]; visibleEl.innerText = match[2]; window.placeCaretAtEnd(visibleEl);
                }
            }
            window.updateOneShotStats();
            const box = document.getElementById('oneshot-fs-preview-box');
            if (!box.classList.contains('hidden')) box.innerText = hiddenEl.value + visibleEl.innerText;
        };
        window.placeCaretAtEnd = function(el) {
            el.focus();
            if (typeof window.getSelection !== "undefined" && typeof document.createRange !== "undefined") {
                const range = document.createRange(); range.selectNodeContents(el); range.collapse(false);
                const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
            }
        };
        window.updateOneShotStats = function() {
            const text = ((document.getElementById('oneshot-fs-hidden')?.value || "") + (document.getElementById('oneshot-fs-visible')?.innerText || "")).trim();

        };

        window.changeCarouselCount = function(delta) {
            const newCount = window.currentCarouselCount + delta;
            if (newCount < 1 || newCount > 20) return;
            const wrapper = document.getElementById('carousel-cards-wrapper');
            const captionEl = document.getElementById('car-input-group-caption');
            if (delta > 0) {
                window.currentCarouselCount++;
                wrapper.insertBefore(window.createCarouselInputGroup(window.currentCarouselCount, window.currentCarouselCount), captionEl);
            } else {
                const lastChild = document.getElementById(`car-input-group-${window.currentCarouselCount}`);
                if (lastChild) wrapper.removeChild(lastChild);
                delete window.currentCarouselImages[window.currentCarouselCount]; 
                window.currentCarouselCount--;
            }
            document.getElementById('carousel-count-display').innerText = window.currentCarouselCount;

        window.processImageFile = function(file, callback) {
            window.showToast("Memproses gambar...");
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width; let height = img.height;
                    const MAX_DIMENSION = 600; // Kompresi Agresif untuk keamanan Firestore
                    if (width > height && width > MAX_DIMENSION) { height = Math.round(height * MAX_DIMENSION / width); width = MAX_DIMENSION; } 
                    else if (height > MAX_DIMENSION) { width = Math.round(width * MAX_DIMENSION / height); height = MAX_DIMENSION; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0, 0, width, height);
                    ctx.drawImage(img, 0, 0, width, height);
                    const dataURL = canvas.toDataURL('image/jpeg', 0.4); // Kualitas 40%
                    
                    if (dataURL.length > 800 * 1024) { window.showToast("Gambar terlalu kompleks/besar untuk Firestore. Mohon potong (crop) gambar Anda."); return; }
                    callback(dataURL, file.name, 'image/jpeg');
                };
                img.onerror = function() { window.showToast("Format gambar tidak didukung."); };
                img.src = e.target.result;
            };
            reader.onerror = function() { window.showToast("Gagal membaca file gambar."); };
            reader.readAsDataURL(file);
        };

        window.handleModalCarouselImage = function(event, index) {
            const file = event.target.files[0]; if (!file) return;
            window.processImageFile(file, (dataUrl) => { window.currentCarouselImages[index] = dataUrl; window.renderModalCarouselImagePreview(index); });
            event.target.value = '';
        };

        window.removeModalCarouselImage = function(index) {
            delete window.currentCarouselImages[index]; window.renderModalCarouselImagePreview(index);
        };

        window.renderModalCarouselImagePreview = function(index) {
            const box = document.getElementById(`car-img-preview-box-${index}`);
            const img = document.getElementById(`car-img-preview-src-${index}`);
            if (!box || !img) return; 
            if (window.currentCarouselImages[index]) { img.src = window.currentCarouselImages[index]; box.classList.remove('hidden'); } 
            else box.classList.add('hidden');
        };

        window.handleFileUpload = function(event, type) {
            const files = event.target.files; if (!files) return;
            Array.from(files).forEach(file => {
                if (type === 'image') {
                    window.processImageFile(file, (dataUrl, fileName, mimeType) => {
                        window.currentAttachments.push({ id: Date.now() + Math.random(), type: 'image', name: fileName, data: dataUrl, mimeType: mimeType });
                        window.renderAttachmentPreview();
                    });
                } else {
                    if (file.size > 1024 * 1024 * 0.8) { window.showToast(`File max 800KB untuk keamanan Cloud.`); return; }
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        window.currentAttachments.push({ id: Date.now() + Math.random(), type: 'file', name: file.name, data: e.target.result, mimeType: file.type });
                        window.renderAttachmentPreview();
                    };
                    reader.readAsDataURL(file);
                }
            });
            event.target.value = ''; 
        };

        window.removeAttachment = function(id) {
            window.currentAttachments = window.currentAttachments.filter(a => a.id !== id); window.renderAttachmentPreview();

        window.renderAttachmentPreview = function() {
            const container = document.getElementById('attachment-preview'); container.innerHTML = '';

                if (att.type === 'image') {
                    container.innerHTML += `
                        <div class="relative w-16 h-16 rounded-xl border border-gray-300 dark:border-gray-600 overflow-hidden shrink-0 shadow-sm">

                            <button onclick="window.removeAttachment(${att.id})" class="absolute top-1 right-1 bg-red-500/90 text-white w-5 h-5 rounded-full flex items-center justify-center text-xs"><i class="fa-solid fa-times"></i></button>
                        </div>
                    `;
                } else {
                    container.innerHTML += `
                        <div class="relative bg-gray-100 dark:bg-gray-700 px-3 py-2 rounded-xl text-xs flex items-center max-w-[150px] shadow-sm text-gray-900 dark:text-white">
                            <i class="fa-solid fa-file text-blue-500 mr-2"></i> <span class="truncate pr-4">${att.name}</span>
                            <button onclick="window.removeAttachment(${att.id})" class="absolute top-1 right-1 text-red-500 w-4 h-4 rounded-full flex items-center justify-center text-[10px]"><i class="fa-solid fa-times"></i></button>
                        </div>
                    `;
                }
            });
        };

        window.openModal = function(editId = null) {
            const overlay = document.getElementById('modal-overlay');
            const modal = document.getElementById('modal');
            
            ['note-id', 'note-title', 'note-content', 'pw-username', 'pw-password', 'pw-link', 'rev-tujuan', 'rev-content', 'inst-link', 'inst-content', 'pur-nama', 'pur-owner', 'pur-harga', 'pur-link', 'pur-keterangan', 'oneshot-fs-hidden'].forEach(id => {
                const el = document.getElementById(id); if(el) el.value = "";
            });
            document.getElementById('oneshot-fs-visible').innerText = "";
            window.updateOneShotStats();
            document.getElementById('oneshot-fs-preview-box').classList.add('hidden');
            
            window.currentAttachments = []; window.currentCarouselImages = {}; 
            document.getElementById('modal-title').innerText = "Buat Catatan";
            let targetCount = 3; 

            if (editId) {
                const note = window.notes.find(n => String(n.id) === String(editId));
                if (note) {
                    document.getElementById('note-id').value = note.id;
                    document.getElementById('note-title').value = note.title;
                    document.getElementById('note-category').value = note.category;
                    document.getElementById('modal-title').innerText = "Edit Catatan";
                    if (note.attachments) window.currentAttachments = [...note.attachments];

                    let p = {}; try{p = JSON.parse(note.content);}catch(e){}

                    if (note.category === 'carousel') {
                        const r = (Array.isArray(p)?p:[]).filter(c => !c.isCaption); const c = (Array.isArray(p)?p:[]).find(c => c.isCaption);

        window.saveNote = async function() {
            const id = document.getElementById('note-id').value;
            const category = document.getElementById('note-category').value;
            const titleInput = document.getElementById('note-title').value.trim();
            
            let content = ""; let rawTextForTitle = "";

            if (category === 'carousel') {
                const carouselData = []; let parsedOld = [];
                if (id) { const ex = window.notes.find(n => String(n.id) === String(id)); if(ex) try { parsedOld = JSON.parse(ex.content); } catch(e){} }
                const oldReg = parsedOld.filter(c => !c.isCaption); const oldCap = parsedOld.find(c => c.isCaption);

                let oldIdx = 0;
                for(let i=1; i<=window.currentCarouselCount; i++) {
                    const txt = document.getElementById(`car-content-${i}`)?.value.trim() || "";
                    carouselData.push({ id: oldReg[oldIdx]?.id || (Date.now() + i), content: txt, image: window.currentCarouselImages[i] || null, isCaption: false });
                    if (!rawTextForTitle && txt) rawTextForTitle = txt; oldIdx++;
                }
                const capTxt = document.getElementById('car-content-caption')?.value.trim() || "";
                carouselData.push({ id: oldCap?.id || (Date.now() + 999), content: capTxt, image: window.currentCarouselImages['caption'] || null, isCaption: true });
                if (!rawTextForTitle && capTxt) rawTextForTitle = capTxt;
                content = JSON.stringify(carouselData);
            } else if (category === 'mypassword') {
                const p = { username: document.getElementById('pw-username').value.trim(), password: document.getElementById('pw-password').value.trim(), link: document.getElementById('pw-link').value.trim() };
                content = JSON.stringify(p); rawTextForTitle = p.username || p.link || "My Password";
            } else if (category === 'revisi') {
                const p = { tujuan: document.getElementById('rev-tujuan').value.trim(), content: document.getElementById('rev-content').value.trim() };
                content = JSON.stringify(p); rawTextForTitle = p.tujuan || p.content || "Revisi";
            } else if (category === 'myinstruction') {
                const p = { link: document.getElementById('inst-link').value.trim(), content: document.getElementById('inst-content').value.trim() };
                content = JSON.stringify(p); rawTextForTitle = p.content || p.link || "Instruction";
            } else if (category === 'mypurchase') {
                const p = { nama: document.getElementById('pur-nama').value.trim(), owner: document.getElementById('pur-owner').value.trim(), harga: document.getElementById('pur-harga').value.trim(), link: document.getElementById('pur-link').value.trim(), keterangan: document.getElementById('pur-keterangan').value.trim() };
                content = JSON.stringify(p); rawTextForTitle = p.nama || p.owner || "My Purchase";
            } else if (category === 'oneshot') {
                content = document.getElementById('oneshot-fs-hidden').value + document.getElementById('oneshot-fs-visible').innerText; rawTextForTitle = content;
            } else {
                content = document.getElementById('note-content').value.trim(); rawTextForTitle = content;
            }

            let title = titleInput || (rawTextForTitle ? rawTextForTitle.replace(/^- \[[xX ]\]\s*/i, '').trim().split(/\s+/).slice(0, 4).join(' ') + (rawTextForTitle.split(/\s+/).length>4?'...':'') : "Tanpa Judul");
            
            let existingNote = id ? window.notes.find(n => String(n.id) === String(id)) : null;
            const finalId = id ? (isNaN(Number(id)) ? id : Number(id)) : Date.now();
            
            const payload = { id: finalId, category: category, title: title, content: content, attachments: [...window.currentAttachments], timestamp: existingNote ? existingNote.timestamp : Date.now(), updatedAt: Date.now() };

            if (JSON.stringify(payload).length > 950000) return window.showToast("Gagal: Total 1MB Cloud Limit. Kurangi gambar!");

            try {
                window.showToast("Menyimpan...");
                await window.setDoc(window.doc(window.db, "notes", payload.id.toString()), payload);
                window.pushHistory('save', existingNote ? JSON.parse(JSON.stringify(existingNote)) : null, JSON.parse(JSON.stringify(payload)));
                window.closeModal();
            } catch (error) { window.showToast("Gagal menyimpan."); }
        };

            let textToCopy = withTitle && note.title ? `${note.title}\n\n` : "";

                let p = {username: '', password: '', link: ''}; try { p = JSON.parse(note.content); } catch(e){}
                let safeLink = window.escapeHTML(p.link); let linkHtml = safeLink ? `<a href="${safeLink.match(/^https?:\/\//i) ? safeLink : 'https://'+safeLink}" target="_blank" onclick="event.stopPropagation()" class="text-blue-500 hover:underline break-all">${safeLink}</a>` : '-';
                previewContent = `<div class="space-y-3 text-[15px] text-gray-900 dark:text-white"><div class="flex flex-col"><span class="text-[12px] text-gray-500 uppercase font-semibold">Username</span><span class="font-medium select-all">${window.escapeHTML(p.username) || '-'}</span></div><div class="flex flex-col"><span class="text-[12px] text-gray-500 uppercase font-semibold">Password</span><span class="font-mono bg-gray-100 dark:bg-gray-800 px-2 py-1 rounded inline-block w-fit select-all">${window.escapeHTML(p.password) || '-'}</span></div><div class="flex flex-col"><span class="text-[12px] text-gray-500 uppercase font-semibold">Link</span><span>${linkHtml}</span></div></div>`;
            } else if (note.category === 'revisi') {
                let p = { tujuan: '', content: '' }; try { p = JSON.parse(note.content); } catch(e){}
                previewContent = `<div class="space-y-3"><div class="bg-blue-50 dark:bg-blue-900/20 p-3.5 rounded-2xl"><span class="block text-[12px] text-blue-500 uppercase font-semibold mb-1">Tujuan</span><span class="text-[14px] text-gray-900 dark:text-white">${window.escapeHTML(p.tujuan) || '-'}</span></div><div class="text-[15px] text-gray-900 dark:text-white whitespace-pre-wrap leading-relaxed px-1">${window.formatTextWithLinks(p.content)}</div></div>`;
            } else if (note.category === 'myinstruction') {
                let p = { link: '', content: '' }; try { p = JSON.parse(note.content); } catch(e) { p.content = note.content; }
                let safeLink = window.escapeHTML(p.link); let linkHtml = safeLink ? `<a href="${safeLink.match(/^https?:\/\//i) ? safeLink : 'https://'+safeLink}" target="_blank" onclick="event.stopPropagation()" class="text-blue-500 hover:underline break-all block mb-3 bg-[#F2F2F7] dark:bg-[#2C2C2E] p-3 rounded-xl"><i class="fa-solid fa-link mr-2"></i>${safeLink}</a>` : '';
                previewContent = `<div>${linkHtml}<div class="text-[15px] text-gray-900 dark:text-white whitespace-pre-wrap leading-relaxed">${window.formatTextWithLinks(p.content)}</div></div>`;
            } else if (note.category === 'mypurchase') {
                let p = { nama: '', owner: '', harga: '', link: '', keterangan: '' }; try { p = JSON.parse(note.content); } catch(e){}
                let safeLink = window.escapeHTML(p.link); let linkHtml = safeLink ? `<a href="${safeLink.match(/^https?:\/\//i) ? safeLink : 'https://'+safeLink}" target="_blank" onclick="event.stopPropagation()" class="text-blue-500 hover:underline truncate block">${safeLink}</a>` : '-';
                previewContent = `<div class="space-y-3"><div class="bg-[#F2F2F7] dark:bg-[#2C2C2E] p-4 rounded-2xl space-y-3"><div class="flex flex-col"><span class="text-[12px] text-gray-500 uppercase font-semibold">Produk</span><span class="font-bold text-gray-900 dark:text-white text-[16px]">${window.escapeHTML(p.nama) || '-'}</span></div><div class="flex gap-4"><div class="flex-1 flex flex-col"><span class="text-[12px] text-gray-500 uppercase font-semibold">Owner</span><span class="text-[14px] text-gray-900 dark:text-white">${window.escapeHTML(p.owner) || '-'}</span></div><div class="flex-1 flex flex-col"><span class="text-[12px] text-gray-500 uppercase font-semibold">Harga</span><span class="text-[14px] text-gray-900 dark:text-white">${window.escapeHTML(p.harga) || '-'}</span></div></div><div class="flex flex-col overflow-hidden"><span class="text-[12px] text-gray-500 uppercase font-semibold">Link</span><span class="text-[14px]">${linkHtml}</span></div></div>${p.keterangan ? `<div class="text-[15px] text-gray-900 dark:text-white whitespace-pre-wrap leading-relaxed px-1">${window.formatTextWithLinks(p.keterangan)}</div>` : ''}</div>`;
            } else if (note.category === 'memo') {
                let htmlMemo = '<div class="space-y-3">';
                note.content.split('\n').forEach((line, index) => {
                    if (!line.trim()) return;
                    let isChecked = line.startsWith('✓ ') || line.startsWith('- [x] ');
                    let cleanLine = line.replace(/^(✓ |- \[x\] |- \[ \] |☐ )/, '');
                    let icon = isChecked ? '<i class="fa-solid fa-circle-check text-blue-500 text-[18px]"></i>' : '<i class="fa-regular fa-circle text-gray-400 text-[18px]"></i>';
                    let lineClass = isChecked ? 'line-through text-gray-400' : 'text-gray-900 dark:text-white';
                    htmlMemo += `<div class="flex items-start cursor-pointer active:opacity-50 transition-opacity" onclick="window.toggleMemoTask('${note.id}', ${index}); event.stopPropagation();"><div class="mt-0.5 mr-3 shrink-0">${icon}</div><div class="${lineClass} text-[15px] leading-relaxed flex-1">${window.formatTextWithLinks(cleanLine)}</div></div>`;
                });
                htmlMemo += '</div>'; if(!note.content.trim()) htmlMemo = '<p class="text-[14px] text-gray-500 italic">Kosong</p>'; previewContent = htmlMemo;
            } else {
                previewContent = `<div class="text-[15px] text-gray-900 dark:text-white whitespace-pre-wrap leading-relaxed">${window.formatTextWithLinks(note.content)}</div>`;
            }

            let imagesHtml = ''; let filesHtml = '';
            if (note.attachments && note.attachments.length > 0) {
                const imgA = note.attachments.filter(a => a.type === 'image'); const fileA = note.attachments.filter(a => a.type !== 'image');
                if (imgA.length > 0) {
                    imagesHtml = `<div class="mb-4 space-y-3">`;
                    imgA.forEach(att => {
                        imagesHtml += `
                        <div class="relative w-full rounded-2xl overflow-hidden border border-gray-200 dark:border-gray-800 shadow-sm bg-gray-100 dark:bg-gray-900">
                            <a href="${att.data}" target="_blank" onclick="event.stopPropagation()"><img src="${att.data}" class="w-full h-auto"></a>
                            <div class="absolute top-3 right-3 flex space-x-2">
                                <a href="${att.data}" download="${att.name}" onclick="event.stopPropagation()" class="w-9 h-9 bg-white/70 dark:bg-black/50 text-gray-900 dark:text-white rounded-full flex items-center justify-center backdrop-blur-md shadow-sm active:scale-95"><i class="fa-solid fa-download text-sm"></i></a>
                                <button onclick="window.removeCardImage('${note.id}', '${att.id}'); event.stopPropagation();" class="w-9 h-9 bg-white/70 dark:bg-black/50 text-red-500 rounded-full flex items-center justify-center backdrop-blur-md shadow-sm active:scale-95"><i class="fa-solid fa-trash text-sm"></i></button>
                            </div>
                        </div>`;
                    });
                    imagesHtml += `</div>`;
                }
                if (fileA.length > 0) {
                    filesHtml = `<div class="mt-4 pt-4 border-t border-gray-200 dark:border-gray-800 flex flex-wrap gap-2">`;
                    fileA.forEach(att => {
                        filesHtml += `<a href="${att.data}" download="${att.name}" onclick="event.stopPropagation()" class="bg-[#F2F2F7] dark:bg-[#2C2C2E] px-4 py-2.5 rounded-xl text-[14px] text-blue-500 font-medium flex items-center shadow-sm"><i class="fa-solid fa-file-arrow-down mr-2"></i> <span class="truncate max-w-[140px]">${att.name}</span></a>`;
                    });
                    filesHtml += `</div>`;
                }
            }

            const badgeHtml = showBadge ? `<span class="px-2 py-0.5 rounded text-[11px] font-bold ml-2 shrink-0 ${catConfig.bg} ${catConfig.color}">${catConfig.icon} ${catConfig.title}</span>` : '';
            const timeHtml = `<div class="text-[12px] text-gray-400 mt-1 truncate">Dibuat: ${window.formatTime(note.timestamp)}</div>`;

            return `
                <div class="bg-white dark:bg-[#1C1C1E] rounded-3xl shadow-sm border border-gray-200 dark:border-gray-800 overflow-hidden break-inside-avoid inline-block w-full mb-4 md:mb-5 relative group">
                    <div class="px-5 py-4 flex justify-between items-start cursor-pointer transition" onclick="window.toggleNote('${note.id}')">
                        <div class="flex-1 pr-3 overflow-hidden">
                            <div class="flex items-center flex-wrap gap-1.5 mb-0.5">
                                <h3 class="font-bold text-gray-900 dark:text-white text-[16px] leading-snug break-words">${window.escapeHTML(note.title)}</h3>
                                ${badgeHtml}
                                ${note.attachments && note.attachments.length > 0 ? '<i class="fa-solid fa-paperclip text-gray-400 text-[12px] shrink-0 ml-1"></i>' : ''}
                            </div>
                            ${timeHtml}
                        </div>
                        
                        <div class="shrink-0 flex items-center pt-1 relative">
                            <!-- Tombol Trigger iOS Action Sheet -->
                            <button onclick="window.openActionSheet(event, '${note.id}', '${note.category}')" class="w-8 h-8 rounded-full flex items-center justify-center text-gray-400 active:bg-gray-100 dark:active:bg-gray-800 transition mr-2">
                                <i class="fa-solid fa-ellipsis"></i>
                            </button>
                            <i class="fa-solid fa-chevron-down text-gray-300 dark:text-gray-600 text-sm chevron-icon ${openClass}" id="note-icon-${note.id}"></i>
                        </div>
                    </div>
                    
                    <div class="accordion-content ${openClass}" id="note-body-${note.id}">
                        <div class="accordion-inner">
                            <div class="px-5 pb-5 pt-1">
                                ${imagesHtml}
                                ${previewContent}
                                ${filesHtml}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        };

        window.renderNotes = function() {
            const container = document.getElementById('notes-container'); container.innerHTML = '';
            if (window.notes.length === 0) {
                container.innerHTML = `<div class="flex flex-col items-center justify-center text-gray-400 pt-32"><i class="fa-regular fa-folder-open text-7xl mb-5 text-gray-300 dark:text-gray-700"></i><p class="font-medium text-lg">Kosong</p></div>`; return;
            }
            let html = '';
            if (window.isGrouped) {
                html += `<div class="columns-1 lg:columns-2 xl:columns-3 gap-5 md:gap-6">`;
                Object.keys(categories).forEach(catKey => {
                    const catNotes = window.notes.filter(n => n.category === catKey).sort((a,b) => b.timestamp - a.timestamp);
                    if (catNotes.length > 0) {
                        const config = categories[catKey]; const openClass = window.openCategories.has(catKey) ? "open" : "";
                        html += `
                            <div class="mb-5 md:mb-6 break-inside-avoid inline-block w-full bg-white dark:bg-[#1C1C1E] border border-gray-200 dark:border-gray-800 rounded-3xl shadow-sm overflow-hidden">
                                <div class="flex justify-between items-center px-5 py-4 cursor-pointer hover:bg-gray-50 dark:hover:bg-[#2C2C2E] transition-colors" onclick="window.toggleCategory('${catKey}')">
                                    <div class="flex items-center">
                                        <div class="w-9 h-9 rounded-xl ${config.bg} ${config.color} flex items-center justify-center mr-3 text-lg">${config.icon}</div>
                                        <h2 class="text-[17px] font-bold text-gray-900 dark:text-white">${config.title}</h2>
                                        <span class="ml-3 bg-[#F2F2F7] dark:bg-[#2C2C2E] text-gray-500 px-2.5 py-0.5 rounded-md text-[13px] font-semibold">${catNotes.length}</span>
                                    </div>
                                    <i class="fa-solid fa-chevron-down text-gray-300 dark:text-gray-600 text-sm chevron-icon ${openClass}" id="cat-icon-${catKey}"></i>
                                </div>
                                <div class="accordion-content ${openClass}" id="cat-body-${catKey}">
                                    <div class="accordion-inner bg-gray-50/50 dark:bg-[#000000] border-t border-gray-100 dark:border-gray-800">
                                        <div class="p-4 pb-0">`;
                        catNotes.forEach(note => { html += window.buildNoteCard(note, false); });
                        html += `</div></div></div></div>`;
                    }
                });
                html += `</div>`;
            } else {
                const allNotes = [...window.notes].sort((a,b) => b.timestamp - a.timestamp);
                html += `<div class="columns-1 sm:columns-2 lg:columns-3 xl:columns-4 gap-4 md:gap-5 lg:gap-6 pt-2">`;
                allNotes.forEach(note => { html += window.buildNoteCard(note, false); });
                html += `</div>`;
            }
            container.innerHTML = html;
        };

        window.onload = () => { window.initTheme(); window.updateUndoRedoUI(); window.loadNotes(); };
    </script>
</body>
</html>
